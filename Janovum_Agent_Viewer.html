<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janovum — Agent Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

  .topnav { background: #111; border-bottom: 1px solid #222; padding: 0 20px; display: flex; align-items: center; gap: 0; position: sticky; top: 0; z-index: 1000; }
  .topnav-brand { font-size: 1.1em; font-weight: 700; background: linear-gradient(135deg, #ff6b35, #f7c948); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 12px 20px 12px 0; border-right: 1px solid #222; margin-right: 4px; white-space: nowrap; text-decoration: none; }
  .topnav a.nav-link { display: flex; align-items: center; gap: 8px; padding: 14px 18px; color: #777; text-decoration: none; font-size: 0.88em; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .topnav a.nav-link:hover { color: #ccc; background: #1a1a1a; }
  .topnav a.nav-link.active { color: #f7c948; border-bottom-color: #f7c948; }

  .main { max-width: 1400px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; font-size: 2em; background: linear-gradient(135deg, #ff6b35, #f7c948); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
  .subtitle { text-align: center; color: #888; font-size: 0.9em; margin-bottom: 24px; }

  .stats { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 140px; }
  .stat-label { font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 1.5em; font-weight: 700; margin-top: 2px; }
  .stat-value.gold { color: #f7c948; }
  .stat-value.green { color: #00c853; }
  .stat-value.blue { color: #42a5f5; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .btn { background: linear-gradient(135deg, #ff6b35, #f7c948); border: none; color: #000; font-weight: 700; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.88em; transition: filter 0.15s; }
  .btn:hover { filter: brightness(1.1); }
  .btn-outline { background: transparent; border: 1px solid #444; color: #ccc; font-weight: 600; }
  .btn-outline:hover { border-color: #f7c948; color: #f7c948; background: transparent; filter: none; }
  .btn-red { background: transparent; border: 1px solid #444; color: #ff5252; }
  .toolbar select { background: #141414; border: 1px solid #333; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 0.88em; outline: none; }
  .refresh-indicator { font-size: 0.78em; color: #555; margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .dot.live { background: #00c853; animation: pulse 2s infinite; }
  .dot.off { background: #555; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 16px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  .card { background: #111; border: 2px solid #222; border-radius: 12px; overflow: hidden; transition: border-color 0.3s; }
  .card.running { border-color: #1a3a1a; box-shadow: 0 0 20px rgba(0,200,83,0.05); }

  .card-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #1a1a1a; }
  .card-name { font-weight: 700; font-size: 0.88em; display: flex; align-items: center; gap: 8px; }
  .badge { font-size: 0.62em; padding: 2px 10px; border-radius: 10px; font-weight: 700; text-transform: uppercase; }
  .badge.running { background: #0a2a0a; color: #00c853; border: 1px solid #1a3a1a; }
  .badge.stopped { background: #1a1a1a; color: #555; border: 1px solid #2a2a2a; }

  .card-task { padding: 6px 14px; font-size: 0.72em; color: #444; border-bottom: 1px solid #111; }

  .card-screen { position: relative; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card-screen img { width: 100%; height: 100%; object-fit: contain; }
  .card-screen .placeholder { color: #222; text-align: center; padding: 30px; }
  .card-screen .live-dot { position: absolute; top: 8px; left: 8px; display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.7); padding: 3px 8px; border-radius: 4px; }
  .card-screen .live-dot .rdot { width: 6px; height: 6px; border-radius: 50%; background: #ff0000; animation: pulse 1s infinite; }
  .card-screen .live-dot span { font-size: 0.62em; color: #ff4444; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .card-screen .time-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #666; font-size: 0.6em; padding: 2px 6px; border-radius: 4px; font-family: monospace; }

  .card-info { display: flex; align-items: center; gap: 8px; padding: 8px 14px; font-size: 0.7em; border-top: 1px solid #1a1a1a; }
  .card-url { flex: 1; color: #42a5f5; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-step { color: #f7c948; font-family: monospace; background: #1a1a0a; border: 1px solid #2a2a1a; padding: 1px 6px; border-radius: 4px; font-size: 0.9em; }

  .empty { text-align: center; padding: 80px 20px; grid-column: 1/-1; }
  .empty h3 { color: #555; margin-bottom: 6px; }
  .empty p { color: #333; font-size: 0.85em; max-width: 500px; margin: 0 auto; line-height: 1.6; }
</style>
</head>
<body>

<nav class="topnav">
  <a class="topnav-brand" href="Janovum_Plan_v6.html">JANOVUM</a>
  <a class="nav-link" href="Janovum_Plan_v6.html">Plan</a>
  <a class="nav-link" href="Janovum_Expenses.html">Expenses</a>
  <a class="nav-link" href="Janovum_Mileage.html">Mileage</a>
  <a class="nav-link" href="Janovum_Platform_v5.html">Toolkit</a>
  <a class="nav-link active" href="Janovum_Agent_Viewer.html">Agent Viewer</a>
</nav>

<div class="main">
  <h1>Agent Viewer</h1>
  <p class="subtitle">Live screenshots from headless browser agents — auto-refreshes from the server</p>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <select id="refreshRate" onchange="changeRate()">
      <option value="2000">Every 2s</option>
      <option value="1000">Every 1s</option>
      <option value="3000">Every 3s</option>
      <option value="5000">Every 5s</option>
    </select>
    <button class="btn" onclick="refresh()">Refresh Now</button>
    <button class="btn-outline btn-red" onclick="clearStopped()">Clear Stopped</button>
    <div class="refresh-indicator">
      <span class="dot live" id="masterDot"></span>
      <span id="masterLabel">Connecting...</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const API = "http://localhost:5050";
let refreshMs = 2000;
let refreshTimer = null;
let agents = {};

async function refresh() {
  try {
    const resp = await fetch(API + "/api/agent/screenshots");
    if (!resp.ok) throw new Error("Server offline");
    const data = await resp.json();

    document.getElementById("masterDot").className = "dot live";
    document.getElementById("masterLabel").textContent = "Connected";

    for (const meta of (data.agents || [])) {
      agents[meta.agent_id] = meta;
    }
    renderAll();
  } catch(e) {
    document.getElementById("masterDot").className = "dot off";
    document.getElementById("masterLabel").textContent = "Server offline - run python server_v2.py";
  }
}

function renderAll() {
  const all = Object.values(agents);
  const running = all.filter(a => a.status === "running").length;
  const stopped = all.length - running;

  document.getElementById("stats").innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Agents</div><div class="stat-value gold">${all.length}</div></div>
    <div class="stat-card"><div class="stat-label">Running</div><div class="stat-value green">${running}</div></div>
    <div class="stat-card"><div class="stat-label">Stopped</div><div class="stat-value blue">${stopped}</div></div>
  `;

  const g = document.getElementById("grid");

  if (all.length === 0) {
    g.innerHTML = `
      <div class="empty">
        <h3>No agents detected</h3>
        <p>When Claude launches a headless browser agent, it will appear here automatically.
        Screenshots refresh every ${refreshMs/1000}s. Make sure the Flask server is running.</p>
      </div>`;
    return;
  }

  all.sort((a, b) => {
    if (a.status === "running" && b.status !== "running") return -1;
    if (b.status === "running" && a.status !== "running") return 1;
    return (b.timestamp || "").localeCompare(a.timestamp || "");
  });

  let html = "";
  for (const a of all) {
    const isRunning = a.status === "running";
    const ts = a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : "";
    const imgUrl = a.screenshot ? `${API}/screenshots/${a.screenshot}?t=${Date.now()}` : "";

    html += `
      <div class="card ${isRunning ? 'running' : ''}">
        <div class="card-head">
          <div class="card-name">
            ${isRunning ? "&#x1F7E2;" : "&#x26AA;"} ${a.agent_id || "Agent"}
          </div>
          <span class="badge ${isRunning ? 'running' : 'stopped'}">${isRunning ? "RUNNING" : "STOPPED"}</span>
        </div>
        ${a.step ? `<div class="card-task">Step: ${a.step}</div>` : ""}
        <div class="card-screen">
          ${imgUrl ?
            `<img src="${imgUrl}" alt="Screenshot">
             ${isRunning ? '<div class="live-dot"><span class="rdot"></span><span>LIVE</span></div>' : ''}
             <span class="time-badge">${ts}</span>` :
            `<div class="placeholder"><p>No screenshot yet</p></div>`
          }
        </div>
        <div class="card-info">
          <span class="card-url">${a.url || ""}</span>
          ${a.step ? `<span class="card-step">${a.step}</span>` : ""}
        </div>
      </div>`;
  }
  g.innerHTML = html;
}

function changeRate() {
  refreshMs = parseInt(document.getElementById("refreshRate").value) || 2000;
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refresh, refreshMs);
}

function clearStopped() {
  for (const id of Object.keys(agents)) {
    if (agents[id].status !== "running") delete agents[id];
  }
  renderAll();
}

// Start
refresh();
refreshTimer = setInterval(refresh, refreshMs);
</script>
</body>
</html>
