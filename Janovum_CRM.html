<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janovum CRM — Lead Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--border:#2a2a2a;--gold:#D4AF37;--green:#00C853;--blue:#4A90D9;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--text:#e0e0e0;--dim:#777;--radius:10px;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:inherit;outline:none;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.header h1{font-size:20px;font-weight:800;letter-spacing:1px;}
.header h1 span{color:var(--gold);}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s;}
.btn-gold{background:var(--gold);color:#000;}.btn-gold:hover{background:#e6c349;}
.btn-green{background:var(--green);color:#000;}.btn-green:hover{background:#00e676;}
.btn-outline{background:none;border:1px solid var(--border);color:var(--dim);}.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}

/* Stats */
.stats{display:flex;gap:10px;padding:16px 24px;flex-wrap:wrap;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;min-width:110px;}
.stat .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.stat .value{font-size:20px;font-weight:800;}

/* Sections */
.section{margin:0 24px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.section-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none;}
.section-header h2{font-size:16px;font-weight:700;flex:1;}
.section-header .count{background:var(--bg4);color:var(--dim);font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;}
.section-header .chevron{font-size:12px;color:var(--dim);transition:transform .2s;}
.section-header.collapsed .chevron{transform:rotate(-90deg);}
.section-body{padding:0 12px 12px;}
.section-body.collapsed{display:none;}

/* Cards */
.lead-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;transition:border-color .2s;flex-wrap:wrap;}
.lead-card:hover{border-color:#444;}
.lead-card.overdue{border-left:3px solid var(--red);}
.lead-card.warm{border-left:3px solid var(--orange);}
.lead-info{flex:1;min-width:200px;}
.lead-name{font-size:14px;font-weight:700;color:#fff;}
.lead-detail{font-size:12px;color:var(--dim);margin-top:2px;}
.lead-detail a{color:var(--blue);text-decoration:none;}
.lead-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.lead-actions{display:flex;gap:6px;flex-wrap:wrap;}

.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block;}
.badge-lead{background:rgba(119,119,119,.15);color:#999;}
.badge-pending{background:rgba(245,158,11,.15);color:var(--orange);}
.badge-crm{background:rgba(0,200,83,.15);color:var(--green);}
.badge-lost{background:rgba(239,68,68,.15);color:var(--red);}
.badge-retry{background:rgba(74,144,217,.15);color:var(--blue);}

.method{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;}
.m-inperson{background:rgba(0,200,83,.1);color:var(--green);}
.m-phone{background:rgba(74,144,217,.1);color:var(--blue);}
.m-email{background:rgba(212,175,55,.1);color:var(--gold);}
.m-social{background:rgba(139,92,246,.1);color:var(--purple);}

.days-ago{font-size:11px;color:var(--dim);white-space:nowrap;}
.days-ago.overdue{color:var(--red);font-weight:600;}

/* Quick action buttons */
.act-yes{background:rgba(0,200,83,.15);border:1px solid rgba(0,200,83,.3);color:var(--green);}
.act-yes:hover{background:rgba(0,200,83,.25);}
.act-no{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);}
.act-no:hover{background:rgba(239,68,68,.2);}
.act-retry{background:rgba(74,144,217,.1);border:1px solid rgba(74,144,217,.2);color:var(--blue);}
.act-retry:hover{background:rgba(74,144,217,.2);}
.act-promote{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.2);color:var(--gold);}
.act-promote:hover{background:rgba(212,175,55,.2);}
.act-edit{background:none;border:1px solid var(--border);color:var(--dim);}
.act-edit:hover{border-color:var(--gold);color:var(--gold);}
.act-del{background:none;border:1px solid var(--border);color:var(--dim);}
.act-del:hover{border-color:var(--red);color:var(--red);}

/* Duplicate warning glow */
.lead-card.duplicate{border:1px solid var(--red);box-shadow:0 0 12px rgba(239,68,68,.3);animation:pulseRed 2s infinite;}
@keyframes pulseRed{0%,100%{box-shadow:0 0 8px rgba(239,68,68,.2);}50%{box-shadow:0 0 18px rgba(239,68,68,.5);}}

/* Search */
.search-bar{padding:0 24px 12px;display:flex;gap:8px;align-items:center;}
.search-input{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;width:260px;transition:border .2s;}
.search-input:focus{border-color:var(--gold);}

/* Empty */
.empty-msg{text-align:center;padding:24px;color:var(--dim);font-size:13px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;}
.modal h2 span{color:var(--gold);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group textarea{resize:vertical;min-height:60px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:768px){
  .header{padding:12px 16px;}.section{margin:0 12px 12px;}.stats{padding:12px 16px;}.search-bar{padding:0 12px 8px;}
  .lead-card{padding:12px;}.search-input{width:100%;}
}
</style>
</head>
<body>

<div class="header">
  <h1>Janovum <span>CRM</span></h1>
  <div class="header-right">
    <button class="btn btn-outline" onclick="exportCSV()">&#128190; Export</button>
    <button class="btn btn-gold" onclick="openModal('lead')">&#43; Add Lead</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="search-bar">
  <input type="text" class="search-input" placeholder="Search all leads..." oninput="searchQ=this.value;render();">
</div>

<!-- LEAD LIST — businesses to pitch -->
<div class="section">
  <div class="section-header" onclick="toggleSec(this)">
    <span style="font-size:18px;">&#128203;</span>
    <h2>Lead List <span style="color:var(--dim);font-weight:400;font-size:13px;">— businesses to pitch</span></h2>
    <span class="count" id="countLeads">0</span>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="section-body" id="secLeads"></div>
</div>

<!-- PENDING — said yes, waiting on them -->
<div class="section">
  <div class="section-header" onclick="toggleSec(this)">
    <span style="font-size:18px;">&#9203;</span>
    <h2>Pending <span style="color:var(--dim);font-weight:400;font-size:13px;">— interested, waiting to schedule</span></h2>
    <span class="count" id="countPending">0</span>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="section-body" id="secPending"></div>
</div>

<!-- SCHEDULED — demo/meeting booked -->
<div class="section">
  <div class="section-header" onclick="toggleSec(this)">
    <span style="font-size:18px;">&#128197;</span>
    <h2>Scheduled <span style="color:var(--dim);font-weight:400;font-size:13px;">— demo or meeting booked</span></h2>
    <span class="count" id="countDemo">0</span>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="section-body" id="secDemo"></div>
</div>

<!-- PROPOSAL SENT -->
<div class="section">
  <div class="section-header" onclick="toggleSec(this)">
    <span style="font-size:18px;">&#128196;</span>
    <h2>Proposal Sent <span style="color:var(--dim);font-weight:400;font-size:13px;">— contract / agreement sent</span></h2>
    <span class="count" id="countProposal">0</span>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="section-body" id="secProposal"></div>
</div>

<!-- CLOSED — deal done -->
<div class="section">
  <div class="section-header" onclick="toggleSec(this)">
    <span style="font-size:18px;">&#128176;</span>
    <h2>Closed <span style="color:var(--dim);font-weight:400;font-size:13px;">— signed and paying</span></h2>
    <span class="count" id="countClosed">0</span>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="section-body" id="secClosed"></div>
</div>

<!-- NOT INTERESTED -->
<div class="section">
  <div class="section-header collapsed" onclick="toggleSec(this)">
    <span style="font-size:18px;">&#128683;</span>
    <h2>Not Interested <span style="color:var(--dim);font-weight:400;font-size:13px;">— said no or lost</span></h2>
    <span class="count" id="countLost">0</span>
    <span class="chevron">&#9660;</span>
  </div>
  <div class="section-body collapsed" id="secLost"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add <span>Lead</span></h2>
    <input type="hidden" id="editId">
    <div class="form-row">
      <div class="form-group"><label>Business Name *</label><input type="text" id="fBusiness" placeholder="Smith Plumbing"></div>
      <div class="form-group"><label>Owner / Manager</label><input type="text" id="fOwner" placeholder="John Smith"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input type="tel" id="fPhone" placeholder="555-123-4567"></div>
      <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="john@smith.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Industry</label>
        <select id="fIndustry"><option value="">Select...</option><option>Restaurant</option><option>Real Estate</option><option>Medical / Dental</option><option>Law Firm</option><option>Salon / Barbershop</option><option>Home Services</option><option>Auto Shop</option><option>Gym / Fitness</option><option>Cleaning</option><option>Construction</option><option>Retail</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Contact Method</label>
        <select id="fMethod"><option value="inperson">In-Person</option><option value="phone">Phone Call</option><option value="email">Email</option><option value="social">Social Media</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Address / Location</label><input type="text" id="fAddress" placeholder="123 Main St"></div>
      <div class="form-group"><label>Stage</label>
        <select id="fStage"><option value="lead">Lead (not pitched yet)</option><option value="pending">Pending (said yes, waiting)</option><option value="demo">Demo Scheduled</option><option value="proposal">Proposal Sent</option><option value="closed">Closed (Won)</option><option value="lost">Not Interested / Lost</option></select>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group"><label>Notes</label><textarea id="fNotes" placeholder="What they said, what they need, when to follow up..."></textarea></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveLead()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'janovum_crm_v2';
let leads = [];
let searchQ = '';

function load() { try { leads = JSON.parse(localStorage.getItem(SK)) || []; } catch(e) { leads = []; } }
function save() { localStorage.setItem(SK, JSON.stringify(leads)); }
function genId() { return 'l_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,4); }
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function daysBetween(d1,d2) { return Math.floor((new Date(d2)-new Date(d1))/(1000*60*60*24)); }
function today() { return new Date().toISOString().split('T')[0]; }
function daysAgoText(date) {
  if(!date) return '';
  const d = daysBetween(date, today());
  if(d===0) return 'Today';
  if(d===1) return 'Yesterday';
  if(d<0) return 'In ' + Math.abs(d) + 'd';
  return d + 'd ago';
}
function nowEST() {
  return new Date().toLocaleString('en-US', {timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}
function formatTimestamp(ts) {
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleString('en-US', {timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function matchSearch(l) {
  if(!searchQ) return true;
  const q = searchQ.toLowerCase();
  return (l.business+l.owner+l.phone+l.email+l.industry+l.notes+l.address).toLowerCase().includes(q);
}

const methodLabel = {inperson:'In-Person',phone:'Phone',email:'Email',social:'Social'};

function isInLostList(lead) {
  const lostLeads = leads.filter(l => l.stage === 'lost' && l.id !== lead.id);
  const biz = lead.business.toLowerCase().trim();
  const phone = (lead.phone||'').replace(/\D/g,'');
  const email = (lead.email||'').toLowerCase().trim();
  return lostLeads.some(l => {
    if (biz && l.business.toLowerCase().trim() === biz) return true;
    if (phone && phone.length >= 7 && (l.phone||'').replace(/\D/g,'') === phone) return true;
    if (email && email.length > 3 && (l.email||'').toLowerCase().trim() === email) return true;
    return false;
  });
}

function renderCard(l, section) {
  const da = daysAgoText(l.dateContacted || l.createdAt?.split('T')[0]);
  const pendingDays = l.stage === 'pending' ? daysBetween(l.movedAt || l.createdAt?.split('T')[0] || today(), today()) : 0;
  const isOverdue = l.stage === 'pending' && pendingDays >= 3;
  const isDuplicate = (l.stage === 'lead' || l.stage === 'retry') && isInLostList(l);
  const classes = isDuplicate ? 'lead-card duplicate' : (isOverdue ? 'lead-card overdue' : (l.stage === 'pending' && pendingDays >= 2 ? 'lead-card warm' : 'lead-card'));

  let actions = '';
  if (section === 'leads') {
    actions = `
      <button class="btn-sm act-yes" onclick="pitched('${l.id}','yes')" title="Said yes / interested">&#10003; Yes</button>
      <button class="btn-sm act-no" onclick="pitched('${l.id}','no')" title="Not interested">&#10007; No</button>
      <button class="btn-sm act-retry" onclick="pitched('${l.id}','retry')" title="No answer / try again">&#128260; Retry</button>
    `;
  } else if (section === 'pending') {
    actions = `
      <button class="btn-sm act-promote" onclick="promote('${l.id}','demo')" title="They scheduled a demo">&#128197; Demo</button>
      <button class="btn-sm act-promote" onclick="promote('${l.id}','proposal')" title="Sent them a proposal">&#128196; Proposal</button>
      <button class="btn-sm act-no" onclick="pitched('${l.id}','no')" title="Lost interest">&#10007; Lost</button>
    `;
  } else if (section === 'demo') {
    actions = `
      <button class="btn-sm act-promote" onclick="promote('${l.id}','proposal')" title="Sent proposal/contract">&#128196; Sent Proposal</button>
      <button class="btn-sm act-no" onclick="pitched('${l.id}','no')" title="Lost">&#10007; Lost</button>
    `;
  } else if (section === 'proposal') {
    actions = `
      <button class="btn-sm act-yes" onclick="promote('${l.id}','closed')" title="They signed!">&#128176; Closed!</button>
      <button class="btn-sm act-no" onclick="pitched('${l.id}','no')" title="Lost">&#10007; Lost</button>
    `;
  } else if (section === 'closed') {
    actions = `<span class="badge badge-crm" style="font-size:12px;">&#10003; Active Client</span>`;
  } else {
    actions = `<button class="btn-sm act-retry" onclick="revive('${l.id}')" title="Move back to leads">&#128260; Retry</button>`;
  }

  return `<div class="${classes}">
    <div class="lead-info">
      <div class="lead-name">${esc(l.business)}${l.retryCount ? ' <span style="font-size:10px;padding:2px 7px;background:rgba(74,144,217,.15);color:var(--blue);border-radius:8px;margin-left:6px;">Retry #'+l.retryCount+'</span>' : ''} <span style="font-size:11px;font-weight:400;color:var(--dim);margin-left:8px;">${section==='leads' ? (l.createdAt ? 'Added ' + formatTimestamp(l.createdAt) : '') : section==='pending' ? (l.pendingAt ? 'Entered Pending ' + formatTimestamp(l.pendingAt) : '') : section==='demo' ? (l.demoAt ? 'Scheduled ' + formatTimestamp(l.demoAt) : '') : section==='proposal' ? (l.proposalAt ? 'Proposal Sent ' + formatTimestamp(l.proposalAt) : '') : section==='closed' ? (l.closedAt ? 'Closed ' + formatTimestamp(l.closedAt) : '') : section==='lost' ? (l.lostAt ? 'Lost ' + formatTimestamp(l.lostAt) : '') : ''}</span></div>
      <div class="lead-detail">
        ${l.owner ? esc(l.owner) + ' &middot; ' : ''}
        ${l.phone ? '<a href="tel:'+esc(l.phone)+'">'+esc(l.phone)+'</a> &middot; ' : ''}
        ${l.email ? '<a href="mailto:'+esc(l.email)+'" style="color:var(--gold);">'+esc(l.email)+'</a> &middot; ' : ''}
        ${l.industry ? esc(l.industry) : ''}
      </div>
      ${l.notes ? '<div class="lead-detail" style="margin-top:4px;color:#666;font-style:italic;">'+esc(l.notes)+'</div>' : ''}
    </div>
    <div class="lead-meta">
      <span class="method m-${l.method}">${methodLabel[l.method]||l.method}</span>
      <span class="days-ago ${isOverdue?'overdue':''}">${da} ${isOverdue ? '&#9888; Reach out!' : ''} ${isDuplicate ? '<span style="color:var(--red);font-weight:700;">&#9888; Already said no before!</span>' : ''}</span>
    </div>
    <div class="lead-actions">
      ${actions}
      <button class="btn-sm act-edit" onclick="openModal('edit','${l.id}')">&#9998;</button>
      <button class="btn-sm act-del" onclick="del('${l.id}')">&#10005;</button>
    </div>
  </div>`;
}

function render() {
  const filtered = leads.filter(matchSearch);
  const leadList = filtered.filter(l => l.stage === 'lead' || l.stage === 'retry');
  const pendingList = filtered.filter(l => l.stage === 'pending');
  const demoList = filtered.filter(l => l.stage === 'demo');
  const proposalList = filtered.filter(l => l.stage === 'proposal');
  const closedList = filtered.filter(l => l.stage === 'closed');
  const lostList = filtered.filter(l => l.stage === 'lost');

  // Sort: most recent first, except retry goes to bottom of leads
  const sortDate = (a,b) => (b.movedAt||b.createdAt||'').localeCompare(a.movedAt||a.createdAt||'');
  leadList.sort((a,b) => {
    if(a.stage==='retry' && b.stage!=='retry') return 1;
    if(a.stage!=='retry' && b.stage==='retry') return -1;
    return sortDate(a,b);
  });
  pendingList.sort((a,b) => {
    const da = daysBetween(a.movedAt||a.createdAt?.split('T')[0]||today(), today());
    const db = daysBetween(b.movedAt||b.createdAt?.split('T')[0]||today(), today());
    return db - da;
  });
  demoList.sort(sortDate);
  proposalList.sort(sortDate);
  closedList.sort(sortDate);
  lostList.sort(sortDate);

  document.getElementById('secLeads').innerHTML = leadList.length ? leadList.map(l=>renderCard(l,'leads')).join('') : '<div class="empty-msg">No leads yet. Add businesses you want to pitch.</div>';
  document.getElementById('secPending').innerHTML = pendingList.length ? pendingList.map(l=>renderCard(l,'pending')).join('') : '<div class="empty-msg">No pending leads. Pitch some businesses first!</div>';
  document.getElementById('secDemo').innerHTML = demoList.length ? demoList.map(l=>renderCard(l,'demo')).join('') : '<div class="empty-msg">No demos scheduled yet.</div>';
  document.getElementById('secProposal').innerHTML = proposalList.length ? proposalList.map(l=>renderCard(l,'proposal')).join('') : '<div class="empty-msg">No proposals sent yet.</div>';
  document.getElementById('secClosed').innerHTML = closedList.length ? closedList.map(l=>renderCard(l,'closed')).join('') : '<div class="empty-msg">No closed deals yet. Keep going!</div>';
  document.getElementById('secLost').innerHTML = lostList.length ? lostList.map(l=>renderCard(l,'lost')).join('') : '<div class="empty-msg">Nobody here yet.</div>';

  document.getElementById('countLeads').textContent = leadList.length;
  document.getElementById('countPending').textContent = pendingList.length;
  document.getElementById('countDemo').textContent = demoList.length;
  document.getElementById('countProposal').textContent = proposalList.length;
  document.getElementById('countClosed').textContent = closedList.length;
  document.getElementById('countLost').textContent = lostList.length;

  // Stats
  const total = leads.length;
  const pitched = leads.filter(l=>l.stage!=='lead').length;
  const interested = leads.filter(l=>['pending','demo','proposal','closed'].includes(l.stage)).length;
  const closed = leads.filter(l=>l.stage==='closed').length;
  const overdueCount = leads.filter(l=>l.stage==='pending' && daysBetween(l.movedAt||l.createdAt?.split('T')[0]||today(),today())>=3).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="label">Total</div><div class="value">${total}</div></div>
    <div class="stat"><div class="label">Pitched</div><div class="value" style="color:var(--blue);">${pitched}</div></div>
    <div class="stat"><div class="label">Interested</div><div class="value" style="color:var(--orange);">${interested}</div></div>
    <div class="stat"><div class="label">Closed</div><div class="value" style="color:var(--green);">${closed}</div></div>
    ${overdueCount > 0 ? `<div class="stat" style="border-color:var(--red);"><div class="label">Reach Out!</div><div class="value" style="color:var(--red);">${overdueCount}</div></div>` : ''}
    ${total > 0 ? `<div class="stat"><div class="label">Close Rate</div><div class="value" style="color:var(--gold);">${Math.round(closed/total*100)}%</div></div>` : ''}
  `;
}

// Actions
function pitched(id, result) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const ts = new Date().toISOString();
  l.dateContacted = l.dateContacted || today();
  l.movedAt = today();
  if(!l.history) l.history = [];
  if(result==='yes') { l.stage='pending'; l.pendingAt=ts; l.history.push({stage:'pending',at:ts}); toast('Moved to Pending'); }
  else if(result==='no') { l.stage='lost'; l.lostAt=ts; l.history.push({stage:'lost',at:ts}); toast('Marked as not interested'); }
  else if(result==='retry') { l.stage='retry'; l.retryCount=(l.retryCount||0)+1; l.lastRetry=ts; l.history.push({stage:'retry #'+l.retryCount,at:ts}); toast('Try again later (moved to bottom)'); }
  save(); render();
}

function promote(id, stage) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const ts = new Date().toISOString();
  l.stage = stage;
  l.movedAt = today();
  if(!l.history) l.history = [];
  if(stage==='demo') { l.demoAt=ts; l.history.push({stage:'demo',at:ts}); }
  if(stage==='proposal') { l.proposalAt=ts; l.history.push({stage:'proposal',at:ts}); }
  if(stage==='closed') { l.closedAt=ts; l.history.push({stage:'closed',at:ts}); }
  const labels = {demo:'Demo Scheduled',proposal:'Proposal Sent',closed:'CLOSED!'};
  toast(labels[stage] || 'Updated');
  save(); render();
}

function revive(id) {
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const ts = new Date().toISOString();
  l.stage = 'lead';
  l.movedAt = today();
  if(!l.history) l.history = [];
  l.history.push({stage:'lead (revived)',at:ts});
  toast('Moved back to Lead List');
  save(); render();
}

function del(id) {
  if(!confirm('Delete this lead?')) return;
  leads = leads.filter(l=>l.id!==id);
  save(); render(); toast('Deleted');
}

// Modal
function openModal(mode, id) {
  const isEdit = mode === 'edit';
  document.getElementById('editId').value = isEdit ? id : '';
  document.getElementById('modalTitle').innerHTML = isEdit ? 'Edit <span>Lead</span>' : 'Add <span>New Lead</span>';

  if(isEdit) {
    const l = leads.find(x=>x.id===id);
    if(!l) return;
    document.getElementById('fBusiness').value = l.business;
    document.getElementById('fOwner').value = l.owner||'';
    document.getElementById('fPhone').value = l.phone||'';
    document.getElementById('fEmail').value = l.email||'';
    document.getElementById('fIndustry').value = l.industry||'';
    document.getElementById('fMethod').value = l.method||'inperson';
    document.getElementById('fAddress').value = l.address||'';
    document.getElementById('fStage').value = l.stage||'lead';
    document.getElementById('fNotes').value = l.notes||'';
  } else {
    ['fBusiness','fOwner','fPhone','fEmail','fAddress','fNotes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('fIndustry').value = '';
    document.getElementById('fMethod').value = 'inperson';
    document.getElementById('fStage').value = 'lead';
  }

  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('fBusiness').focus(),100);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function saveLead() {
  const business = document.getElementById('fBusiness').value.trim();
  if(!business) { document.getElementById('fBusiness').style.borderColor='var(--red)'; return; }

  const editId = document.getElementById('editId').value;
  const data = {
    id: editId || genId(),
    business,
    owner: document.getElementById('fOwner').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    industry: document.getElementById('fIndustry').value,
    method: document.getElementById('fMethod').value,
    address: document.getElementById('fAddress').value.trim(),
    stage: document.getElementById('fStage').value,
    notes: document.getElementById('fNotes').value.trim(),
    dateContacted: editId ? (leads.find(l=>l.id===editId)||{}).dateContacted || '' : '',
    movedAt: editId ? (leads.find(l=>l.id===editId)||{}).movedAt || today() : today(),
    createdAt: editId ? (leads.find(l=>l.id===editId)||{}).createdAt || new Date().toISOString() : new Date().toISOString()
  };

  if(editId) { const idx=leads.findIndex(l=>l.id===editId); if(idx>=0) leads[idx]=data; }
  else leads.push(data);

  save(); closeModal(); render();
  toast(editId ? 'Updated' : 'Lead added');
}

function exportCSV() {
  if(!leads.length) { toast('No data'); return; }
  const h = ['Business','Owner','Phone','Email','Industry','Method','Stage','Address','Date Contacted','Notes'];
  const rows = leads.map(l=>[l.business,l.owner,l.phone,l.email,l.industry,l.method,l.stage,l.address,l.dateContacted,l.notes].map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(','));
  const blob = new Blob([[h.join(','),...rows].join('\n')],{type:'text/csv'});
  const a = document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='janovum_leads_'+today()+'.csv'; a.click();
  toast('Exported');
}

function toggleSec(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Keyboard
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); if(e.ctrlKey&&e.key==='n'){e.preventDefault();openModal('lead');} });
document.getElementById('modalOverlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); });
