<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janovum Drive</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#2a2a2a;
--gold:#D4AF37;--gold2:#c49b2f;--green:#00C853;--green2:#00a844;
--text:#e0e0e0;--text2:#999;--text3:#666;--red:#ef4444;--red2:#dc2626;
--border:#333;--radius:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,textarea,select{font-family:inherit;outline:none;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#555;}

/* HEADER */
.header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
.header-logo{font-size:20px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),#f0d060,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;cursor:pointer;}
.header-search{flex:1;max-width:560px;position:relative;}
.header-search input{width:100%;padding:10px 16px 10px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:14px;transition:border .2s;}
.header-search input:focus{border-color:var(--gold);}
.header-search .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;}
.header-search .search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);background:none;font-size:18px;display:none;}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.view-toggle{display:flex;background:var(--bg3);border-radius:6px;overflow:hidden;}
.view-toggle button{padding:8px 12px;background:none;color:var(--text2);font-size:16px;transition:all .2s;}
.view-toggle button.active{background:var(--bg5);color:var(--gold);}
.btn-new{padding:10px 20px;background:var(--gold);color:#000;font-weight:600;font-size:14px;border-radius:24px;display:flex;align-items:center;gap:6px;transition:background .2s;position:relative;}
.btn-new:hover{background:var(--gold2);}
.new-dropdown{position:absolute;top:100%;left:0;margin-top:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none;z-index:200;}
.new-dropdown.show{display:block;}
.new-dropdown button{display:flex;align-items:center;gap:10px;width:100%;padding:12px 16px;background:none;color:var(--text);font-size:14px;text-align:left;transition:background .15s;}
.new-dropdown button:hover{background:var(--bg5);}
.new-dropdown button span.ico{font-size:18px;width:24px;text-align:center;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:width .2s;}
.sidebar-section{padding:8px 0;}
.sidebar-section-title{padding:6px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .15s;font-size:14px;color:var(--text2);border-left:3px solid transparent;}
.sidebar-item:hover{background:var(--bg3);color:var(--text);}
.sidebar-item.active{background:var(--bg3);color:var(--gold);border-left-color:var(--gold);}
.sidebar-item .ico{font-size:16px;width:22px;text-align:center;}
.sidebar-item .badge{margin-left:auto;background:var(--bg5);color:var(--text3);font-size:11px;padding:2px 7px;border-radius:10px;}
.sidebar-divider{height:1px;background:var(--border);margin:4px 12px;}
.sidebar-recent-item{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 24px;cursor:pointer;font-size:13px;color:var(--text3);transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-recent-item:hover{color:var(--text);background:var(--bg3);}
.storage-bar-wrap{padding:12px 16px;margin-top:auto;}
.storage-bar{height:4px;background:var(--bg5);border-radius:2px;overflow:hidden;}
.storage-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:2px;transition:width .3s;}
.storage-label{font-size:11px;color:var(--text3);margin-top:6px;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:14px;flex:1;min-width:0;}
.breadcrumb span{color:var(--text3);cursor:pointer;transition:color .15s;white-space:nowrap;}
.breadcrumb span:hover{color:var(--text);}
.breadcrumb span.current{color:var(--gold);cursor:default;}
.breadcrumb .sep{color:var(--text3);margin:0 2px;}
.sort-select{padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;}

/* STATS BAR */
.stats-bar{display:flex;gap:24px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.stat-item{font-size:12px;color:var(--text2);}
.stat-item strong{color:var(--gold);font-weight:600;}

/* FILE GRID */
.file-area{flex:1;overflow-y:auto;padding:16px 20px;}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.file-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;position:relative;}
.file-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(212,175,55,.1);}
.file-card .card-icon{font-size:36px;margin-bottom:10px;}
.file-card .card-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.file-card .card-meta{font-size:11px;color:var(--text3);}
.file-card .card-star{position:absolute;top:8px;right:8px;font-size:16px;background:none;color:var(--text3);transition:color .2s;}
.file-card .card-star:hover,.file-card .card-star.starred{color:var(--gold);}
.file-card .card-actions{position:absolute;top:8px;right:32px;display:none;}
.file-card:hover .card-actions{display:flex;gap:2px;}
.card-actions button{background:none;color:var(--text2);font-size:14px;padding:2px 4px;border-radius:4px;transition:all .15s;}
.card-actions button:hover{color:var(--text);background:var(--bg5);}

/* FILE LIST */
.file-list{display:flex;flex-direction:column;}
.file-row{display:grid;grid-template-columns:40px 1fr 100px 80px 140px 120px;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;gap:8px;}
.file-row:hover{background:var(--bg3);}
.file-row .row-icon{font-size:22px;text-align:center;}
.file-row .row-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-row .row-type{font-size:12px;color:var(--text3);}
.file-row .row-size{font-size:12px;color:var(--text3);}
.file-row .row-modified{font-size:12px;color:var(--text3);}
.file-row .row-actions{display:flex;gap:4px;justify-content:flex-end;}
.file-row .row-actions button{background:none;color:var(--text3);font-size:14px;padding:4px;border-radius:4px;transition:all .15s;}
.file-row .row-actions button:hover{color:var(--text);background:var(--bg5);}
.list-header{display:grid;grid-template-columns:40px 1fr 100px 80px 140px 120px;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);gap:8px;cursor:pointer;}
.list-header span:hover{color:var(--text);}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);}
.empty-state .empty-icon{font-size:64px;margin-bottom:16px;opacity:.5;}
.empty-state p{font-size:14px;}

/* EDITOR */
.editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;}
.editor-overlay.show{display:flex;}
.editor-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:90%;max-width:900px;height:85vh;display:flex;flex-direction:column;overflow:hidden;}
.editor-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);}
.editor-title-input{flex:1;background:none;border:none;color:var(--text);font-size:18px;font-weight:600;}
.editor-title-input::placeholder{color:var(--text3);}
.editor-meta{font-size:11px;color:var(--text3);white-space:nowrap;}
.editor-close{background:none;color:var(--text2);font-size:22px;padding:4px 8px;border-radius:6px;transition:all .15s;}
.editor-close:hover{background:var(--bg5);color:var(--text);}
.editor-toolbar{display:flex;align-items:center;gap:2px;padding:8px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.editor-toolbar button{background:none;color:var(--text2);padding:6px 10px;border-radius:4px;font-size:14px;transition:all .15s;font-weight:600;}
.editor-toolbar button:hover{background:var(--bg5);color:var(--text);}
.editor-toolbar button.active{color:var(--gold);background:var(--bg4);}
.editor-toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
.editor-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.editor-content{flex:1;padding:20px;overflow-y:auto;font-size:15px;line-height:1.7;color:var(--text);outline:none;min-height:200px;}
.editor-content:empty::before{content:attr(data-placeholder);color:var(--text3);}
.editor-footer{display:flex;align-items:center;gap:12px;padding:12px 20px;border-top:1px solid var(--border);}
.editor-footer .word-count{font-size:12px;color:var(--text3);margin-right:auto;}
.editor-footer .auto-save{font-size:12px;color:var(--green);display:none;}
.editor-footer .auto-save.show{display:block;}
.btn-editor{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .2s;}
.btn-save{background:var(--gold);color:#000;}
.btn-save:hover{background:var(--gold2);}
.btn-export{background:var(--bg4);color:var(--text);}
.btn-export:hover{background:var(--bg5);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:360px;max-width:480px;width:90%;}
.modal h3{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text);}
.modal-input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;margin-bottom:16px;}
.modal-input:focus{border-color:var(--gold);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btns button{padding:8px 20px;border-radius:6px;font-size:14px;font-weight:500;transition:all .2s;}
.btn-cancel{background:var(--bg4);color:var(--text);}
.btn-cancel:hover{background:var(--bg5);}
.btn-confirm{background:var(--gold);color:#000;}
.btn-confirm:hover{background:var(--gold2);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:var(--red2);}
.move-folder-list{max-height:240px;overflow-y:auto;margin-bottom:16px;border:1px solid var(--border);border-radius:6px;}
.move-folder-item{padding:10px 14px;cursor:pointer;font-size:14px;transition:background .15s;display:flex;align-items:center;gap:8px;}
.move-folder-item:hover{background:var(--bg3);}
.move-folder-item.selected{background:var(--bg4);color:var(--gold);}

/* CONTEXT MENU */
.context-menu{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:700;display:none;}
.context-menu.show{display:block;}
.context-menu button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;background:none;color:var(--text);font-size:13px;text-align:left;transition:background .15s;}
.context-menu button:hover{background:var(--bg5);}
.context-menu button .ico{font-size:15px;width:20px;text-align:center;}
.context-menu .ctx-sep{height:1px;background:var(--border);margin:4px 8px;}

/* SEARCH RESULTS */
.search-results{padding:20px;}
.search-results h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text2);}
.search-result-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all .15s;}
.search-result-item:hover{border-color:var(--gold);}
.search-result-item .sr-icon{font-size:24px;}
.search-result-item .sr-name{font-size:14px;font-weight:500;}
.search-result-item .sr-path{font-size:11px;color:var(--text3);}
.search-result-item .sr-snippet{font-size:12px;color:var(--text2);margin-top:2px;}
mark{background:rgba(212,175,55,.3);color:var(--gold);padding:0 2px;border-radius:2px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:14px;z-index:900;box-shadow:0 4px 16px rgba(0,0,0,.4);transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);}
.toast.error{border-color:var(--red);}

/* MOBILE */
.sidebar-toggle{display:none;background:none;color:var(--text);font-size:22px;padding:4px;}
@media(max-width:768px){
.sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:300;transition:left .3s;width:240px;}
.sidebar.open{left:0;}
.sidebar-toggle{display:block;}
.sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;display:none;}
.sidebar-backdrop.show{display:block;}
.file-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
.file-row{grid-template-columns:32px 1fr 80px 80px;font-size:12px;}
.file-row .row-type,.file-row .row-size{display:none;}
.list-header{grid-template-columns:32px 1fr 80px 80px;}
.list-header span:nth-child(3),.list-header span:nth-child(4){display:none;}
.header{padding:10px 12px;gap:10px;}
.header-logo{font-size:16px;}
.stats-bar{gap:12px;padding:8px 12px;flex-wrap:wrap;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
<button class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
<div class="header-logo" onclick="navigateTo('root')">JANOVUM DRIVE</div>
<div class="header-search">
<span class="search-icon">&#128269;</span>
<input type="text" id="searchInput" placeholder="Search documents..." oninput="handleSearch(this.value)">
<button class="search-clear" id="searchClear" onclick="clearSearch()">&#10005;</button>
</div>
<div class="header-right">
<div class="view-toggle">
<button id="btnGrid" class="active" onclick="setView('grid')" title="Grid view">&#9638;</button>
<button id="btnList" onclick="setView('list')" title="List view">&#9776;</button>
</div>
<div style="position:relative;">
<button class="btn-new" onclick="toggleNewMenu(event)">&#43; New</button>
<div class="new-dropdown" id="newDropdown">
<button onclick="newDocument()"><span class="ico">&#128196;</span> New Document</button>
<button onclick="newFolder()"><span class="ico">&#128193;</span> New Folder</button>
<button onclick="uploadFile()"><span class="ico">&#128206;</span> Upload File</button>
</div>
</div>
</div>
</div>

<!-- LAYOUT -->
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
<div class="sidebar-section">
<div class="sidebar-item active" data-nav="root" onclick="navigateTo('root')">
<span class="ico">&#127968;</span> My Drive
</div>
<div class="sidebar-item" data-nav="starred" onclick="showStarred()">
<span class="ico">&#11088;</span> Starred <span class="badge" id="starredCount">0</span>
</div>
<div class="sidebar-item" data-nav="recent" onclick="showRecent()">
<span class="ico">&#128340;</span> Recent
</div>
<div class="sidebar-item" data-nav="trash" onclick="showTrash()">
<span class="ico">&#128465;</span> Trash <span class="badge" id="trashCount">0</span>
</div>
</div>
<div class="sidebar-divider"></div>
<div class="sidebar-section">
<div class="sidebar-section-title">Folders</div>
<div id="sidebarFolders"></div>
</div>
<div class="sidebar-divider"></div>
<div class="sidebar-section">
<div class="sidebar-section-title">Recent Files</div>
<div id="sidebarRecent"></div>
</div>
<div class="storage-bar-wrap">
<div class="storage-bar"><div class="storage-bar-fill" id="storageBarFill" style="width:0%"></div></div>
<div class="storage-label" id="storageLabel">0 KB used</div>
</div>
</div>

<!-- MAIN -->
<div class="main">
<div class="toolbar">
<div class="breadcrumb" id="breadcrumb"></div>
<select class="sort-select" id="sortSelect" onchange="render()">
<option value="name-asc">Name A-Z</option>
<option value="name-desc">Name Z-A</option>
<option value="modified-desc" selected>Newest first</option>
<option value="modified-asc">Oldest first</option>
<option value="type-asc">Type</option>
<option value="size-desc">Largest first</option>
</select>
</div>
<div class="stats-bar">
<div class="stat-item">&#128196; Documents: <strong id="statDocs">0</strong></div>
<div class="stat-item">&#128193; Folders: <strong id="statFolders">0</strong></div>
<div class="stat-item">&#128190; Storage: <strong id="statStorage">0 KB</strong></div>
<div class="stat-item">&#128340; Last activity: <strong id="statActivity">-</strong></div>
</div>
<div class="file-area" id="fileArea"></div>
</div>
</div>

<!-- EDITOR OVERLAY -->
<div class="editor-overlay" id="editorOverlay">
<div class="editor-panel">
<div class="editor-header">
<input class="editor-title-input" id="editorTitle" placeholder="Untitled Document">
<span class="editor-meta" id="editorMeta"></span>
<button class="editor-close" onclick="closeEditor()">&#10005;</button>
</div>
<div class="editor-toolbar">
<button onclick="execCmd('bold')" title="Bold"><b>B</b></button>
<button onclick="execCmd('italic')" title="Italic"><i>I</i></button>
<button onclick="execCmd('underline')" title="Underline"><u>U</u></button>
<div class="sep"></div>
<button onclick="execCmd('formatBlock','H1')" title="Heading 1">H1</button>
<button onclick="execCmd('formatBlock','H2')" title="Heading 2">H2</button>
<button onclick="execCmd('formatBlock','H3')" title="Heading 3">H3</button>
<button onclick="execCmd('formatBlock','P')" title="Paragraph">P</button>
<div class="sep"></div>
<button onclick="execCmd('insertUnorderedList')" title="Bullet List">&#8226; List</button>
<button onclick="execCmd('insertOrderedList')" title="Numbered List">1. List</button>
<div class="sep"></div>
<button onclick="insertLink()" title="Insert Link">&#128279; Link</button>
<button onclick="execCmd('strikeThrough')" title="Strikethrough"><s>S</s></button>
</div>
<div class="editor-body">
<div class="editor-content" id="editorContent" contenteditable="true" data-placeholder="Start typing your document..."></div>
</div>
<div class="editor-footer">
<span class="word-count" id="wordCount">0 words</span>
<span class="auto-save" id="autoSaveIndicator">Auto-saved</span>
<button class="btn-editor btn-export" onclick="exportDoc('txt')">Export TXT</button>
<button class="btn-editor btn-export" onclick="exportDoc('html')">Export HTML</button>
<button class="btn-editor btn-save" onclick="saveDoc()">Save</button>
</div>
</div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="modalContent"></div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu" id="contextMenu"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="fileInput" style="display:none" multiple onchange="handleFileUpload(event)">

<script>
// =================== DATA LAYER ===================
const STORAGE_KEY = 'janovum_drive';
let data = { files: [] };
let currentFolder = 'root';
let currentView = 'grid';
let editingFileId = null;
let searchMode = false;
let specialView = null; // 'starred', 'recent', 'trash'
let autoSaveTimer = null;

function generateId() {
  return 'f_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
}

function loadData() {
  try {
    const ver = localStorage.getItem(STORAGE_KEY + '_ver');
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw && ver === 'v2') {
      data = JSON.parse(raw);
    } else {
      initDefaultData();
      localStorage.setItem(STORAGE_KEY + '_ver', 'v2');
    }
  } catch(e) {
    initDefaultData();
    localStorage.setItem(STORAGE_KEY + '_ver', 'v2');
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function now() { return new Date().toISOString(); }

function addFile(f) {
  data.files.push(f);
  saveData();
}

function getFile(id) { return data.files.find(f => f.id === id); }

function getChildren(parentId, includeTrash) {
  return data.files.filter(f => f.parent === parentId && (includeTrash || !f.trashed));
}

function getFolders(includeTrash) {
  return data.files.filter(f => f.type === 'folder' && (includeTrash || !f.trashed));
}

function getPath(folderId) {
  const path = [];
  let id = folderId;
  while (id && id !== 'root') {
    const f = getFile(id);
    if (!f) break;
    path.unshift({ id: f.id, name: f.name });
    id = f.parent;
  }
  path.unshift({ id: 'root', name: 'My Drive' });
  return path;
}

function getPathString(fileId) {
  const f = getFile(fileId);
  if (!f) return '';
  const path = getPath(f.parent);
  return path.map(p => p.name).join(' > ');
}

function getIcon(file) {
  if (file.type === 'folder') return '\u{1F4C1}';
  if (file.type === 'document') return '\u{1F4C4}';
  if (file.mimeType && file.mimeType.startsWith('image/')) return '\u{1F5BC}';
  if (file.tags && file.tags.includes('template')) return '\u{1F4CB}';
  return '\u{1F4CE}';
}

function getTypeLabel(file) {
  if (file.type === 'folder') return 'Folder';
  if (file.type === 'document') return 'Document';
  if (file.mimeType) {
    const m = file.mimeType.split('/')[1] || file.mimeType;
    return m.toUpperCase();
  }
  return 'File';
}

function formatSize(bytes) {
  if (!bytes || bytes === 0) return '-';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(2) + ' MB';
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const now2 = new Date();
  const diff = now2 - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getTotalStorage() {
  const raw = localStorage.getItem(STORAGE_KEY) || '';
  return new Blob([raw]).size;
}

// =================== RENDERING ===================
function render() {
  if (searchMode) return;
  updateSidebar();
  updateBreadcrumb();
  updateStats();
  renderFiles();
}

function updateSidebar() {
  // Active item
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if (specialView) {
    const el = document.querySelector(`.sidebar-item[data-nav="${specialView}"]`);
    if (el) el.classList.add('active');
  } else {
    const el = document.querySelector('.sidebar-item[data-nav="root"]');
    if (el) el.classList.add('active');
  }

  // Starred count
  const starredCount = data.files.filter(f => f.starred && !f.trashed).length;
  document.getElementById('starredCount').textContent = starredCount;

  // Trash count
  const trashCount = data.files.filter(f => f.trashed).length;
  document.getElementById('trashCount').textContent = trashCount;

  // Folder tree
  const folderDiv = document.getElementById('sidebarFolders');
  const rootFolders = data.files.filter(f => f.type === 'folder' && f.parent === 'root' && !f.trashed);
  folderDiv.innerHTML = rootFolders.map(f => `
    <div class="sidebar-item ${currentFolder === f.id && !specialView ? 'active' : ''}" onclick="navigateTo('${f.id}')">
      <span class="ico">\u{1F4C1}</span> ${escHtml(f.name)}
      <span class="badge">${getChildren(f.id).length}</span>
    </div>
  `).join('');

  // Recent files
  const recentDiv = document.getElementById('sidebarRecent');
  const recentFiles = data.files
    .filter(f => f.type !== 'folder' && !f.trashed)
    .sort((a, b) => new Date(b.modified) - new Date(a.modified))
    .slice(0, 10);
  recentDiv.innerHTML = recentFiles.map(f => `
    <div class="sidebar-recent-item" onclick="openFile('${f.id}')">
      ${getIcon(f)} ${escHtml(f.name)}
    </div>
  `).join('');

  // Storage
  const used = getTotalStorage();
  const pct = Math.min((used / (5*1024*1024)) * 100, 100);
  document.getElementById('storageBarFill').style.width = pct + '%';
  document.getElementById('storageLabel').textContent = formatSize(used) + ' of 5 MB used';
}

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (specialView) {
    const labels = { starred: '\u2B50 Starred', recent: '\u{1F554} Recent', trash: '\u{1F5D1} Trash' };
    bc.innerHTML = `<span onclick="navigateTo('root')">My Drive</span><span class="sep">&rsaquo;</span><span class="current">${labels[specialView]}</span>`;
    return;
  }
  const path = getPath(currentFolder);
  bc.innerHTML = path.map((p, i) => {
    if (i === path.length - 1) return `<span class="current">${escHtml(p.name)}</span>`;
    return `<span onclick="navigateTo('${p.id}')">${escHtml(p.name)}</span><span class="sep">&rsaquo;</span>`;
  }).join('');
}

function updateStats() {
  const docs = data.files.filter(f => f.type === 'document' && !f.trashed).length;
  const folders = data.files.filter(f => f.type === 'folder' && !f.trashed).length;
  const storage = getTotalStorage();
  const lastMod = data.files.filter(f => !f.trashed).sort((a,b) => new Date(b.modified) - new Date(a.modified))[0];

  document.getElementById('statDocs').textContent = docs;
  document.getElementById('statFolders').textContent = folders;
  document.getElementById('statStorage').textContent = formatSize(storage);
  document.getElementById('statActivity').textContent = lastMod ? formatDate(lastMod.modified) : '-';
}

function renderFiles() {
  const area = document.getElementById('fileArea');
  let items;

  if (specialView === 'starred') {
    items = data.files.filter(f => f.starred && !f.trashed);
  } else if (specialView === 'recent') {
    items = data.files.filter(f => f.type !== 'folder' && !f.trashed)
      .sort((a,b) => new Date(b.modified) - new Date(a.modified)).slice(0, 20);
  } else if (specialView === 'trash') {
    items = data.files.filter(f => f.trashed);
  } else {
    items = getChildren(currentFolder);
  }

  // Sort
  const sortVal = document.getElementById('sortSelect').value;
  if (specialView !== 'recent') {
    items = sortItems(items, sortVal);
  }

  if (items.length === 0) {
    const msgs = {
      starred: 'No starred items',
      recent: 'No recent files',
      trash: 'Trash is empty'
    };
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">\u{1F4C2}</div><p>${msgs[specialView] || 'This folder is empty'}</p></div>`;
    return;
  }

  if (currentView === 'grid') {
    area.innerHTML = `<div class="file-grid">${items.map(f => renderCard(f)).join('')}</div>`;
  } else {
    area.innerHTML = `
      <div class="list-header">
        <span></span><span>Name</span><span>Type</span><span>Size</span><span>Modified</span><span>Actions</span>
      </div>
      <div class="file-list">${items.map(f => renderRow(f)).join('')}</div>`;
  }
}

function sortItems(items, sortVal) {
  const [key, dir] = sortVal.split('-');
  const folders = items.filter(f => f.type === 'folder');
  const files = items.filter(f => f.type !== 'folder');
  const sortFn = (a, b) => {
    let va, vb;
    if (key === 'name') { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    else if (key === 'modified') { va = new Date(a.modified); vb = new Date(b.modified); }
    else if (key === 'type') { va = getTypeLabel(a); vb = getTypeLabel(b); }
    else if (key === 'size') { va = a.size || 0; vb = b.size || 0; }
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  };
  folders.sort(sortFn);
  files.sort(sortFn);
  return [...folders, ...files];
}

function renderCard(f) {
  const starCls = f.starred ? 'starred' : '';
  const starIcon = f.starred ? '\u2605' : '\u2606';
  return `
    <div class="file-card" onclick="openFile('${f.id}')" oncontextmenu="showContext(event,'${f.id}')">
      <div class="card-actions">
        <button onclick="event.stopPropagation();showContext(event,'${f.id}')" title="More">\u22EE</button>
      </div>
      <button class="card-star ${starCls}" onclick="event.stopPropagation();toggleStar('${f.id}')" title="Star">${starIcon}</button>
      <div class="card-icon">${getIcon(f)}</div>
      <div class="card-name">${escHtml(f.name)}</div>
      <div class="card-meta">${getTypeLabel(f)} &middot; ${formatDate(f.modified)}</div>
    </div>`;
}

function renderRow(f) {
  const starIcon = f.starred ? '\u2605' : '\u2606';
  return `
    <div class="file-row" onclick="openFile('${f.id}')" oncontextmenu="showContext(event,'${f.id}')">
      <div class="row-icon">${getIcon(f)}</div>
      <div class="row-name">${f.starred ? '<span style="color:var(--gold);margin-right:4px">\u2605</span>' : ''}${escHtml(f.name)}</div>
      <div class="row-type">${getTypeLabel(f)}</div>
      <div class="row-size">${formatSize(f.size)}</div>
      <div class="row-modified">${formatDate(f.modified)}</div>
      <div class="row-actions">
        <button onclick="event.stopPropagation();toggleStar('${f.id}')" title="Star">${starIcon}</button>
        <button onclick="event.stopPropagation();showContext(event,'${f.id}')" title="More">\u22EE</button>
      </div>
    </div>`;
}

function navigateTo(folderId) {
  searchMode = false;
  specialView = null;
  currentFolder = folderId;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  closeSidebarMobile();
  render();
}

function showStarred() { specialView = 'starred'; searchMode = false; closeSidebarMobile(); render(); }
function showRecent() { specialView = 'recent'; searchMode = false; closeSidebarMobile(); render(); }
function showTrash() { specialView = 'trash'; searchMode = false; closeSidebarMobile(); render(); }

function openFile(id) {
  const f = getFile(id);
  if (!f) return;
  if (f.type === 'folder') {
    specialView = null;
    searchMode = false;
    currentFolder = f.id;
    render();
    return;
  }
  // Update modified for "recent" tracking
  f.modified = now();
  saveData();
  if (f.type === 'document') {
    openEditor(id);
  } else {
    downloadFile(id);
  }
}

    id: generateId(), name, type: 'folder', parent: target,
    content: '', mimeType: '', size: 0,
    created: ts, modified: ts, starred: false, trashed: false, tags: []
  });
  closeModal();
  render();
  toast('Folder created', 'success');
}

function uploadFile() {
  closeNewMenu();
  document.getElementById('fileInput').click();
}

function handleFileUpload(event) {
  const files = event.target.files;
  if (!files.length) return;
  const target = specialView ? 'root' : currentFolder;
  let count = 0;

  Array.from(files).forEach(file => {
    if (file.size > 2 * 1024 * 1024) {
      toast(`${file.name} is too large (max 2MB per file)`, 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      const ts = now();
      addFile({
        id: generateId(), name: file.name, type: 'file', parent: target,
        content: e.target.result, mimeType: file.type || 'application/octet-stream',
        size: file.size, created: ts, modified: ts, starred: false, trashed: false, tags: []
      });
      count++;
      if (count === files.length || count === Array.from(files).filter(f2 => f2.size <= 2*1024*1024).length) {
        render();
        toast(count + ' file(s) uploaded', 'success');
      }
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

function renameFile(id) {
  const f = getFile(id);
  if (!f) return;
  hideContext();
  showModal('Rename', `<input class="modal-input" id="modalInput" value="${escAttr(f.name)}" autofocus>`, [
    { text: 'Cancel', cls: 'btn-cancel', action: 'closeModal()' },
    { text: 'Rename', cls: 'btn-confirm', action: `doRename('${id}')` }
  ]);
  setTimeout(() => {
    const inp = document.getElementById('modalInput');
    if (inp) { inp.focus(); inp.select(); inp.addEventListener('keydown', e => { if (e.key === 'Enter') doRename(id); }); }
  }, 100);
}

function doRename(id) {
  const name = document.getElementById('modalInput').value.trim();
  if (!name) return;
  const f = getFile(id);
  f.name = name;
  f.modified = now();
  saveData();
  closeModal();
  render();
  toast('Renamed', 'success');
}

function deleteFile(id) {
  const f = getFile(id);
  if (!f) return;
  hideContext();
  if (f.trashed) {
    showModal('Delete Permanently?', `<p style="color:var(--text2);margin-bottom:16px">This will permanently delete "<strong>${escHtml(f.name)}</strong>". This cannot be undone.</p>`, [
      { text: 'Cancel', cls: 'btn-cancel', action: 'closeModal()' },
      { text: 'Delete Forever', cls: 'btn-danger', action: `permDelete('${id}')` }
    ]);
  } else {
    f.trashed = true;
    f.modified = now();
    // Also trash children if folder
    if (f.type === 'folder') trashChildren(f.id, true);
    saveData();
    render();
    toast('Moved to Trash', 'success');
  }
}

function trashChildren(folderId, trashed) {
  data.files.filter(f => f.parent === folderId).forEach(f => {
    f.trashed = trashed;
    if (f.type === 'folder') trashChildren(f.id, trashed);
  });
}

function permDelete(id) {
  const f = getFile(id);
  if (f && f.type === 'folder') {
    // Delete children recursively
    const deleteRecursive = (fid) => {
      data.files.filter(ff => ff.parent === fid).forEach(ff => {
        if (ff.type === 'folder') deleteRecursive(ff.id);
        data.files = data.files.filter(x => x.id !== ff.id);
      });
    };
    deleteRecursive(id);
  }
  data.files = data.files.filter(ff => ff.id !== id);
  saveData();
  closeModal();
  render();
  toast('Permanently deleted', 'success');
}

function restoreFile(id) {
  const f = getFile(id);
  if (!f) return;
  hideContext();
  f.trashed = false;
  f.modified = now();
  if (f.type === 'folder') trashChildren(f.id, false);
  // If parent is trashed, move to root
  const parent = getFile(f.parent);
  if (parent && parent.trashed) f.parent = 'root';
  saveData();
  render();
  toast('Restored', 'success');
}

function emptyTrash() {
  hideContext();
  showModal('Empty Trash?', '<p style="color:var(--text2);margin-bottom:16px">All items in Trash will be permanently deleted. This cannot be undone.</p>', [
    { text: 'Cancel', cls: 'btn-cancel', action: 'closeModal()' },
    { text: 'Empty Trash', cls: 'btn-danger', action: 'doEmptyTrash()' }
  ]);
}

function doEmptyTrash() {
  data.files = data.files.filter(f => !f.trashed);
  saveData();
  closeModal();
  render();
  toast('Trash emptied', 'success');
}

function moveFile(id) {
  const f = getFile(id);
  if (!f) return;
  hideContext();
  const folders = getFolders(false).filter(ff => ff.id !== id);
  const folderListHtml = `
    <div class="move-folder-list">
      <div class="move-folder-item" data-target="root" onclick="selectMoveTarget(this,'root')">\u{1F3E0} My Drive (Root)</div>
      ${folders.map(ff => `<div class="move-folder-item" data-target="${ff.id}" onclick="selectMoveTarget(this,'${ff.id}')">\u{1F4C1} ${escHtml(ff.name)}</div>`).join('')}
    </div>`;
  showModal(`Move "${escHtml(f.name)}"`, folderListHtml, [
    { text: 'Cancel', cls: 'btn-cancel', action: 'closeModal()' },
    { text: 'Move Here', cls: 'btn-confirm', action: `doMove('${id}')` }
  ]);
  window._moveTarget = f.parent;
}

function selectMoveTarget(el, targetId) {
  document.querySelectorAll('.move-folder-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  window._moveTarget = targetId;
}

function doMove(id) {
  const f = getFile(id);
  if (!f || !window._moveTarget) return;
  f.parent = window._moveTarget;
  f.modified = now();
  saveData();
  closeModal();
  render();
  toast('Moved', 'success');
}

function toggleStar(id) {
  const f = getFile(id);
  if (!f) return;
  f.starred = !f.starred;
  saveData();
  render();
}

function downloadFile(id) {
  const f = getFile(id);
  if (!f) return;
  hideContext();
  if (f.type === 'document') {
    const blob = new Blob([f.content], { type: 'text/plain' });
    downloadBlob(blob, f.name + '.txt');
  } else if (f.content && f.content.startsWith('data:')) {
    const a = document.createElement('a');
    a.href = f.content;
    a.download = f.name;
    a.click();
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function duplicateFile(id) {
  const f = getFile(id);
  if (!f) return;
  hideContext();
  const ts = now();
  const copy = { ...f, id: generateId(), name: f.name + ' (Copy)', created: ts, modified: ts, starred: false };
  addFile(copy);
  render();
  toast('Duplicated', 'success');
}

// =================== EDITOR ===================
function openEditor(id) {
  editingFileId = id;
  const f = getFile(id);
  if (!f) return;
  document.getElementById('editorTitle').value = f.name;
  document.getElementById('editorContent').innerHTML = f.content || '';
  updateEditorMeta();
  updateWordCount();
  document.getElementById('editorOverlay').classList.add('show');
  document.getElementById('editorContent').focus();
}

function closeEditor() {
  if (editingFileId) saveDoc();
  document.getElementById('editorOverlay').classList.remove('show');
  editingFileId = null;
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  render();
}

function saveDoc() {
  if (!editingFileId) return;
  const f = getFile(editingFileId);
  if (!f) return;
  f.name = document.getElementById('editorTitle').value.trim() || 'Untitled';
  f.content = document.getElementById('editorContent').innerHTML;
  f.size = new Blob([f.content]).size;
  f.modified = now();
  saveData();
  updateEditorMeta();
  const indicator = document.getElementById('autoSaveIndicator');
  indicator.classList.add('show');
  setTimeout(() => indicator.classList.remove('show'), 2000);
}

function updateEditorMeta() {
  if (!editingFileId) return;
  const f = getFile(editingFileId);
  if (!f) return;
  document.getElementById('editorMeta').textContent = 'Last modified: ' + formatDate(f.modified);
}

function updateWordCount() {
  const text = document.getElementById('editorContent').innerText || '';
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words + ' word' + (words !== 1 ? 's' : '');
}

// Auto-save on typing
document.getElementById('editorContent').addEventListener('input', () => {
  updateWordCount();
  if (autoSaveTimer) clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => saveDoc(), 2000);
});

function execCmd(cmd, val) {
  if (cmd === 'formatBlock') {
    document.execCommand('formatBlock', false, '<' + val + '>');
  } else {
    document.execCommand(cmd, false, val || null);
  }
  document.getElementById('editorContent').focus();
}

function insertLink() {
  const url = prompt('Enter URL:');
  if (url) document.execCommand('createLink', false, url);
}

function exportDoc(format) {
  if (!editingFileId) return;
  const f = getFile(editingFileId);
  if (!f) return;
  if (format === 'txt') {
    const text = document.getElementById('editorContent').innerText;
    downloadBlob(new Blob([text], { type: 'text/plain' }), f.name + '.txt');
  } else {
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escHtml(f.name)}</title><style>body{font-family:Inter,sans-serif;max-width:800px;margin:40px auto;padding:0 20px;color:#222;line-height:1.6;}</style></head><body>${f.content}</body></html>`;
    downloadBlob(new Blob([html], { type: 'text/html' }), f.name + '.html');
  }
}

// =================== SEARCH ===================
function handleSearch(query) {
  const clearBtn = document.getElementById('searchClear');
  if (!query.trim()) {
    clearSearch();
    return;
  }
  clearBtn.style.display = 'block';
  searchMode = true;
  specialView = null;

  const q = query.toLowerCase();
  const results = data.files.filter(f => !f.trashed && (
    f.name.toLowerCase().includes(q) ||
    (f.content && f.type === 'document' && stripHtml(f.content).toLowerCase().includes(q))
  ));

  const area = document.getElementById('fileArea');
  if (results.length === 0) {
    area.innerHTML = `<div class="search-results"><h3>No results for "${escHtml(query)}"</h3></div>`;
    return;
  }

  area.innerHTML = `<div class="search-results"><h3>${results.length} result(s) for "${escHtml(query)}"</h3>
    ${results.map(f => {
      let snippet = '';
      if (f.type === 'document' && f.content) {
        const plain = stripHtml(f.content);
        const idx = plain.toLowerCase().indexOf(q);
        if (idx >= 0) {
          const start = Math.max(0, idx - 40);
          const end = Math.min(plain.length, idx + q.length + 40);
          snippet = '...' + escHtml(plain.substring(start, idx)) + '<mark>' + escHtml(plain.substring(idx, idx + q.length)) + '</mark>' + escHtml(plain.substring(idx + q.length, end)) + '...';
        }
      }
      return `<div class="search-result-item" onclick="openFile('${f.id}')">
        <div class="sr-icon">${getIcon(f)}</div>
        <div>
          <div class="sr-name">${escHtml(f.name)}</div>
          <div class="sr-path">${getPathString(f.id)}</div>
          ${snippet ? `<div class="sr-snippet">${snippet}</div>` : ''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  searchMode = false;
  render();
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

// =================== CONTEXT MENU ===================
function showContext(event, id) {
  event.preventDefault();
  event.stopPropagation();
  const f = getFile(id);
  if (!f) return;
  const menu = document.getElementById('contextMenu');

  let items = '';
  if (f.trashed) {
    items = `
      <button onclick="restoreFile('${id}')"><span class="ico">\u21A9</span> Restore</button>
      <button onclick="deleteFile('${id}')"><span class="ico">\u{1F5D1}</span> Delete Forever</button>`;
  } else {
    items = `
      <button onclick="openFile('${id}')"><span class="ico">${f.type === 'folder' ? '\u{1F4C2}' : '\u270F'}</span> ${f.type === 'folder' ? 'Open' : 'Edit'}</button>
      <button onclick="renameFile('${id}')"><span class="ico">\u270D</span> Rename</button>
      <button onclick="toggleStar('${id}');hideContext()"><span class="ico">${f.starred ? '\u2606' : '\u2605'}</span> ${f.starred ? 'Unstar' : 'Star'}</button>
      <div class="ctx-sep"></div>
      <button onclick="moveFile('${id}')"><span class="ico">\u{1F4E6}</span> Move to...</button>
      <button onclick="duplicateFile('${id}')"><span class="ico">\u{1F4CB}</span> Duplicate</button>
      ${f.type !== 'folder' ? `<button onclick="downloadFile('${id}')"><span class="ico">\u2B07</span> Download</button>` : ''}
      <div class="ctx-sep"></div>
      <button onclick="deleteFile('${id}')" style="color:var(--red)"><span class="ico">\u{1F5D1}</span> Delete</button>`;
  }

  menu.innerHTML = items;
  menu.classList.add('show');

  // Position
  let x = event.clientX, y = event.clientY;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';

  // Keep on screen
  requestAnimationFrame(() => {
    const rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
    if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
  });
}

function hideContext() {
  document.getElementById('contextMenu').classList.remove('show');
}

document.addEventListener('click', (e) => {
  hideContext();
  if (!e.target.closest('.btn-new') && !e.target.closest('.new-dropdown')) closeNewMenu();
});

// =================== MODALS ===================
function showModal(title, body, buttons) {
  const modal = document.getElementById('modalContent');
  modal.innerHTML = `<h3>${title}</h3>${body}<div class="modal-btns">${buttons.map(b =>
    `<button class="${b.cls}" onclick="${b.action}">${b.text}</button>`
  ).join('')}</div>`;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('editorOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('editorOverlay')) closeEditor();
});

// =================== NEW MENU ===================
function toggleNewMenu(e) {
  e.stopPropagation();
  document.getElementById('newDropdown').classList.toggle('show');
}
function closeNewMenu() {
  document.getElementById('newDropdown').classList.remove('show');
}

// =================== VIEW TOGGLE ===================
function setView(view) {
  currentView = view;
  document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
  document.getElementById('btnList').classList.toggle('active', view === 'list');
  render();
}

// =================== SIDEBAR MOBILE ===================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('show');
}
function closeSidebarMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}

// =================== TOAST ===================
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// =================== UTILS ===================
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

// =================== KEYBOARD ===================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('editorOverlay').classList.contains('show')) closeEditor();
    else if (document.getElementById('modalOverlay').classList.contains('show')) closeModal();
    else if (searchMode) clearSearch();
  }
  // Ctrl+S to save in editor
  if (e.ctrlKey && e.key === 's' && document.getElementById('editorOverlay').classList.contains('show')) {
    e.preventDefault();
    saveDoc();
    toast('Saved', 'success');
  }
});

// =================== INIT ===================
loadData();
render();
</script>
</body>
</html>
