function getNoteKey(num) { return `janovum_note_${num}`; }

function getNote(num) {
  const userNote = localStorage.getItem(getNoteKey(num));
  if (userNote !== null) return userNote;
  return DEFAULT_NOTES[num] || '';
}
function saveNote(num, text) {
  if (text.trim() === '') {
    localStorage.removeItem(getNoteKey(num));
  } else {
    localStorage.setItem(getNoteKey(num), text);
  }
}
function clearAllNotes() {
  for (let i = 1; i <= 101; i++) {
    localStorage.removeItem(getNoteKey(i));
  }
}

function render() {
  const saved = JSON.parse(localStorage.getItem('janovum_progress') || '{}');
  const container = document.getElementById('plan');
  container.innerHTML = '';
  let totalChecked = 0;
  phases.forEach((phase, pi) => {
    const div = document.createElement('div');
    div.className = `phase ${phase.className}`;
    let phaseChecked = 0;
    phase.steps.forEach(s => { if (saved[s.num]) phaseChecked++; });
    totalChecked += phaseChecked;
    div.innerHTML = `
      <div class="phase-header" onclick="togglePhase(${pi})">
        <h2>${phase.name}</h2>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="phase-count">${phaseChecked}/${phase.steps.length}</span>
          <span class="toggle" id="toggle-${pi}">\u25BC</span>
        </div>
      </div>
      <div class="steps" id="steps-${pi}">
        ${phase.steps.map(s => {
          const hasNote = getNote(s.num) !== '';
          return `
          <div class="step ${saved[s.num] ? 'completed' : ''}" id="step-${s.num}">
            <div class="step-header" onclick="toggleDetails(${s.num})">
              <input type="checkbox" ${saved[s.num] ? 'checked' : ''} onclick="event.stopPropagation();toggleCheck(${s.num})">
              <span class="step-number">#${s.num}</span>
              <span class="step-title">${s.title}</span>
              <button class="expand-btn">details</button>
            </div>
            <div class="step-details" id="details-${s.num}">
              <ul>${s.details.map(d => `<li>${d}</li>`).join('')}</ul>
              ${s.budget ? `<p class="budget">${s.budget}</p>` : ''}
              <div class="notes-toggle-row">
                <button class="notes-toggle-btn ${hasNote ? 'has-note' : ''}" onclick="event.stopPropagation();toggleNotes(${s.num})">
                  ${hasNote ? '<span class="note-indicator"></span>' : ''}Notes
                </button>
                <span class="notes-saved-indicator" id="notes-saved-${s.num}">saved</span>
              </div>
              <div class="notes-area" id="notes-area-${s.num}">
                <textarea
                  id="note-input-${s.num}"
                  placeholder="Add your notes for this step..."
                  oninput="handleNoteInput(${s.num})"
                >${getNote(s.num)}</textarea>
                <button class="notes-expand-btn" id="expand-btn-${s.num}" onclick="event.stopPropagation();toggleExpand(${s.num})">Expand</button>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(div);
  });
  updateProgress(totalChecked);
}

let noteTimers = {};
function handleNoteInput(num) {
  clearTimeout(noteTimers[num]);
  noteTimers[num] = setTimeout(() => {
    const textarea = document.getElementById(`note-input-${num}`);
    if (!textarea) return;
    saveNote(num, textarea.value);
    // Update the notes button indicator without re-rendering the whole page
    const step = document.getElementById(`step-${num}`);
    if (step) {
      const btn = step.querySelector('.notes-toggle-btn');
      const hasNote = textarea.value.trim() !== '';
      if (hasNote) {
        btn.classList.add('has-note');
        if (!btn.querySelector('.note-indicator')) {
          const dot = document.createElement('span');
          dot.className = 'note-indicator';
          btn.prepend(dot);
        }
      } else {
        btn.classList.remove('has-note');
        const dot = btn.querySelector('.note-indicator');
        if (dot) dot.remove();
      }
    }
    // Flash "saved" indicator
    const savedEl = document.getElementById(`notes-saved-${num}`);
    if (savedEl) {
      savedEl.classList.add('visible');
      setTimeout(() => savedEl.classList.remove('visible'), 1500);
    }
  }, 400);
}

function toggleExpand(num) {
  const textarea = document.getElementById(`note-input-${num}`);
  const btn = document.getElementById(`expand-btn-${num}`);
  if (textarea && btn) {
    textarea.classList.toggle('expanded');
    btn.textContent = textarea.classList.contains('expanded') ? 'Collapse' : 'Expand';
  }
}

function toggleNotes(num) {
  const area = document.getElementById(`notes-area-${num}`);
  if (area) {
    area.classList.toggle('show');
    if (area.classList.contains('show')) {
      const textarea = document.getElementById(`note-input-${num}`);
      if (textarea) textarea.focus();
    }
  }
}

function toggleCheck(num) {
  const saved = JSON.parse(localStorage.getItem('janovum_progress') || '{}');
  saved[num] = !saved[num];
  if (!saved[num]) delete saved[num];
  localStorage.setItem('janovum_progress', JSON.stringify(saved));
  render();
}
function toggleDetails(num) { document.getElementById(`details-${num}`).classList.toggle('show'); }
function togglePhase(pi) { document.getElementById(`steps-${pi}`).classList.toggle('hidden'); document.getElementById(`toggle-${pi}`).classList.toggle('collapsed'); }
function updateProgress(checked) {
  const pct = Math.round((checked / TOTAL) * 100);
  document.getElementById('progress-label').textContent = `${checked} / ${TOTAL} Steps Completed`;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
}
render();
</script>
</div><!-- /page-content -->
</body>
