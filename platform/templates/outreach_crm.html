<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janovum — Outreach Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--border:#2a2a2a;--gold:#D4AF37;--green:#00C853;--blue:#4A90D9;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--teal:#4ecdc4;--text:#e0e0e0;--dim:#777;--radius:10px;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:inherit;outline:none;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.header h1{font-size:20px;font-weight:800;letter-spacing:1px;}
.header h1 span{color:var(--gold);}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s;}
.btn-gold{background:var(--gold);color:#000;}.btn-gold:hover{background:#e6c349;}
.btn-outline{background:none;border:1px solid var(--border);color:var(--dim);}.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

.tabs{display:flex;gap:4px;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;color:var(--dim);background:none;transition:all .2s;}
.tab:hover{color:#ccc;background:var(--bg3);}
.tab.active{color:var(--gold);background:var(--bg3);}

.stats{display:flex;gap:10px;padding:16px 24px;flex-wrap:wrap;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;min-width:110px;}
.stat .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.stat .value{font-size:20px;font-weight:800;}

.section{margin:0 24px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.section-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none;}
.section-header h2{font-size:16px;font-weight:700;flex:1;}
.section-header .count{background:var(--bg4);color:var(--dim);font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px;}
.section-header .chevron{font-size:12px;color:var(--dim);transition:transform .2s;}
.section-header.collapsed .chevron{transform:rotate(-90deg);}
.section-body{padding:0 12px 12px;}
.section-body.collapsed{display:none;}

.card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;transition:border-color .2s;flex-wrap:wrap;}
.card:hover{border-color:#444;}
.card.investor{border-left:3px solid var(--purple);}
.card.job{border-left:3px solid var(--teal);}
.card-info{flex:1;min-width:200px;}
.card-name{font-size:14px;font-weight:700;color:#fff;}
.card-detail{font-size:12px;color:var(--dim);margin-top:2px;}
.card-detail a{color:var(--blue);text-decoration:none;}
.card-detail a.gold{color:var(--gold);}
.card-notes{font-size:12px;color:#555;font-style:italic;margin-top:4px;}
.card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.card-actions{display:flex;gap:6px;flex-wrap:wrap;}

.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block;}
.badge-investor{background:rgba(139,92,246,.15);color:var(--purple);}
.badge-job{background:rgba(78,205,196,.15);color:var(--teal);}
.badge-email{background:rgba(212,175,55,.1);color:var(--gold);}

.days-ago{font-size:11px;color:var(--dim);white-space:nowrap;}
.timestamp{font-size:10px;color:var(--dim);font-weight:400;margin-left:8px;}

.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
.act-yes{background:rgba(0,200,83,.15);border:1px solid rgba(0,200,83,.3);color:var(--green);}
.act-yes:hover{background:rgba(0,200,83,.25);}
.act-no{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);}
.act-no:hover{background:rgba(239,68,68,.2);}
.act-retry{background:rgba(74,144,217,.1);border:1px solid rgba(74,144,217,.2);color:var(--blue);}
.act-retry:hover{background:rgba(74,144,217,.2);}
.act-promote{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.2);color:var(--gold);}
.act-promote:hover{background:rgba(212,175,55,.2);}
.act-edit{background:none;border:1px solid var(--border);color:var(--dim);}
.act-edit:hover{border-color:var(--gold);color:var(--gold);}
.act-del{background:none;border:1px solid var(--border);color:var(--dim);}
.act-del:hover{border-color:var(--red);color:var(--red);}

.search-bar{padding:0 24px 12px;display:flex;gap:8px;align-items:center;}
.search-input{padding:8px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;width:260px;transition:border .2s;}
.search-input:focus{border-color:var(--gold);}

.empty-msg{text-align:center;padding:24px;color:var(--dim);font-size:13px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;}.modal h2 span{color:var(--gold);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group textarea{resize:vertical;min-height:60px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:768px){.header{padding:12px 16px;}.section{margin:0 12px 12px;}.stats{padding:12px 16px;}.search-bar{padding:0 12px 8px;}.search-input{width:100%;}}
</style>
</head>
<body>

<div class="header">
  <h1>Janovum <span>Outreach</span></h1>
  <div class="header-right">
    <button class="btn btn-outline" onclick="exportCSV()">&#128190; Export</button>
    <button class="btn btn-gold" onclick="openModal('add')">&#43; Add Contact</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setFilter('all',this)">All</button>
  <button class="tab" onclick="setFilter('investor',this)">Investors</button>
  <button class="tab" onclick="setFilter('job',this)">Jobs</button>
</div>

<div class="stats" id="stats"></div>

<div class="search-bar">
  <input type="text" class="search-input" placeholder="Search company, contact, email..." oninput="searchQ=this.value;render();">
</div>

<div class="section"><div class="section-header" onclick="toggleSec(this)"><span style="font-size:18px;">&#128232;</span><h2>Sent <span style="color:var(--dim);font-weight:400;font-size:13px;">&#8212; email delivered, waiting for reply</span></h2><span class="count" id="countSent">0</span><span class="chevron">&#9660;</span></div><div class="section-body" id="secSent"></div></div>

<div class="section"><div class="section-header" onclick="toggleSec(this)"><span style="font-size:18px;">&#128172;</span><h2>Replied <span style="color:var(--dim);font-weight:400;font-size:13px;">&#8212; they responded</span></h2><span class="count" id="countReplied">0</span><span class="chevron">&#9660;</span></div><div class="section-body" id="secReplied"></div></div>

<div class="section"><div class="section-header" onclick="toggleSec(this)"><span style="font-size:18px;">&#128197;</span><h2>Call Scheduled <span style="color:var(--dim);font-weight:400;font-size:13px;">&#8212; meeting booked</span></h2><span class="count" id="countCall">0</span><span class="chevron">&#9660;</span></div><div class="section-body" id="secCall"></div></div>

<div class="section"><div class="section-header" onclick="toggleSec(this)"><span style="font-size:18px;">&#128176;</span><h2>Closed <span style="color:var(--dim);font-weight:400;font-size:13px;">&#8212; deal done / hired</span></h2><span class="count" id="countClosed">0</span><span class="chevron">&#9660;</span></div><div class="section-body" id="secClosed"></div></div>

<div class="section"><div class="section-header collapsed" onclick="toggleSec(this)"><span style="font-size:18px;">&#128683;</span><h2>No Response / Lost <span style="color:var(--dim);font-weight:400;font-size:13px;">&#8212; no reply or not interested</span></h2><span class="count" id="countLost">0</span><span class="chevron">&#9660;</span></div><div class="section-body collapsed" id="secLost"></div></div>

<div class="section"><div class="section-header collapsed" onclick="toggleSec(this)"><span style="font-size:18px;">&#128165;</span><h2>Bounced <span style="color:var(--dim);font-weight:400;font-size:13px;">&#8212; email failed</span></h2><span class="count" id="countBounced">0</span><span class="chevron">&#9660;</span></div><div class="section-body collapsed" id="secBounced"></div></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add <span>Contact</span></h2>
    <input type="hidden" id="editId">
    <div class="form-row">
      <div class="form-group"><label>Company *</label><input type="text" id="fCompany" placeholder="AutomateNexus"></div>
      <div class="form-group"><label>Contact Name</label><input type="text" id="fContact" placeholder="Erin Moore (CEO)"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email *</label><input type="email" id="fEmail" placeholder="info@company.com"></div>
      <div class="form-group"><label>Type</label>
        <select id="fType"><option value="investor">Investor</option><option value="job">Job</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Stage</label>
        <select id="fStage"><option value="sent">Sent</option><option value="replied">Replied</option><option value="call">Call Scheduled</option><option value="closed">Closed</option><option value="lost">No Response / Lost</option><option value="bounced">Bounced</option></select>
      </div>
      <div class="form-group"><label>Location</label><input type="text" id="fLocation" placeholder="Miami, FL"></div>
    </div>
    <div class="form-row full">
      <div class="form-group"><label>Notes</label><textarea id="fNotes" placeholder="What they said, what to follow up on..."></textarea></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveContact()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SK = 'janovum_outreach_v2';
var items = [];
var searchQ = '';
var filterType = 'all';

var defaultItems = [
  {id:'o1',company:'AutomateNexus',contact:'Erin Moore (CEO)',email:'info@automatenexus.com',type:'job',stage:'replied',location:'Florida',sentAt:'2026-03-26T13:29:00',repliedAt:'2026-03-26T13:43:00',notes:'Wants to hire! Asked for resume + non-compete. Resume sent. Waiting for call link.'},
  {id:'o2',company:'Buster Digital Media',contact:'Buster Cox (CEO)',email:'b@busterdigitalmedia.com',type:'job',stage:'sent',location:'Miami, FL',sentAt:'2026-03-26T13:29:00',notes:'AI automation agency. Same thing we do.'},
  {id:'o3',company:'Avenue Z',contact:'Team',email:'hello@avenuez.com',type:'job',stage:'sent',location:'Miami, FL',sentAt:'2026-03-26T13:29:00',notes:'AI marketing + automation. 3050 Biscayne Blvd.'},
  {id:'o4',company:'DonQuijotech',contact:'Team',email:'info@donquijotech.com',type:'job',stage:'sent',location:'Miami Beach, FL',sentAt:'2026-03-26T14:41:00',notes:'AI consulting for small biz. Bilingual.'},
  {id:'o5',company:'AutoCraft Studios',contact:'Laura & Nathan Ooley',email:'info@autocraftstudios.com',type:'job',stage:'sent',location:'Florida',sentAt:'2026-03-26T14:41:00',notes:'AI agents + workflow automation.'},
  {id:'o6',company:'Glasswing Ventures',contact:'Rudina Seseri (GP)',email:'rudina@glasswing.vc',type:'investor',stage:'replied',location:'Boston, MA',sentAt:'2026-03-26T17:41:00',repliedAt:'2026-03-26T17:43:00',notes:'OOO until March 30. Contact tyler@glasswing.vc. $200M AI fund.'},
  {id:'o7',company:'Glasswing Ventures',contact:'Tyler Fohrman (CoS)',email:'tyler@glasswing.vc',type:'investor',stage:'sent',location:'Boston, MA',sentAt:'2026-03-26T20:43:00',notes:'Referred by Rudina while she is OOO.'},
  {id:'o8',company:'New World Angels',contact:'Team',email:'info@newworldangels.com',type:'investor',stage:'sent',location:'Boca Raton, FL',sentAt:'2026-03-26T15:33:00',notes:'FL longest-running angel syndicate. $20M+ deployed.'},
  {id:'o9',company:'New World Angels',contact:'Jessica Miley (MD)',email:'jessica@newworldangels.com',type:'investor',stage:'sent',location:'Boca Raton, FL',sentAt:'2026-03-26T17:41:00',notes:'Managing Director. Direct contact.'},
  {id:'o10',company:'Florida Funders',contact:'Saxon Baum (Partner)',email:'saxonb@floridafunders.com',type:'investor',stage:'sent',location:'Tampa, FL',sentAt:'2026-03-26T15:33:00',notes:'VC/angel hybrid, B2B SaaS + AI. $300M deployed.'},
  {id:'o11',company:'Cane Angel Network',contact:'Sonja Markova (ED)',email:'smarkova@miami.edu',type:'investor',stage:'sent',location:'Miami, FL',sentAt:'2026-03-26T15:17:00',notes:'University of Miami angel network. PDF attached.'},
  {id:'o12',company:'Cane Angel Network',contact:'J. Camp',email:'j.camp@miami.edu',type:'investor',stage:'sent',location:'Miami, FL',sentAt:'2026-03-26T15:17:00',notes:'Same network, second contact.'},
  {id:'o13',company:'Forum Ventures',contact:'Team',email:'hello@forumvc.com',type:'investor',stage:'sent',location:'New York, NY',sentAt:'2026-03-26T17:41:00',notes:'B2B AI pre-seed accelerator. 430 companies funded.'},
  {id:'o14',company:'boldstart ventures',contact:'Team',email:'info@boldstart.vc',type:'investor',stage:'sent',location:'New York, NY',sentAt:'2026-03-26T17:41:00',notes:'Enterprise/dev-first seed.'},
  {id:'o15',company:'Bee Partners',contact:'Team',email:'hello@beepartners.vc',type:'investor',stage:'sent',location:'San Francisco, CA',sentAt:'2026-03-26T20:43:00',notes:'Pre-seed $500K-$1.5M. Deep tech/AI.'},
  {id:'o16',company:'Tamiami Angel Funds',contact:'Danielle',email:'danielle@tamiamiangels.com',type:'investor',stage:'sent',location:'Naples, FL',sentAt:'2026-03-26T20:43:00',notes:'$36.6M deployed, 48 companies.'},
  {id:'o17',company:'Speedinvest',contact:'Team',email:'pitch@speedinvest.com',type:'investor',stage:'sent',location:'Vienna (Global)',sentAt:'2026-03-26T20:43:00',notes:'EU/global SaaS pre-seed/seed.'},
  {id:'o18',company:'Miami Angels',contact:'Team',email:'hello@miamiangels.vc',type:'investor',stage:'replied',location:'Miami, FL',sentAt:'2026-03-26T14:12:00',repliedAt:'2026-03-26T14:12:00',notes:'Auto-reply: merged with New World Angels.'},
];

function load() {
  try {
    var saved = JSON.parse(localStorage.getItem(SK));
    if (saved && saved.length > 0) { items = saved; return; }
  } catch(e) {}
  items = JSON.parse(JSON.stringify(defaultItems));
  save();
}
function save() { localStorage.setItem(SK, JSON.stringify(items)); }
function genId() { return 'o_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,4); }
function esc(s) { if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function formatTS(ts) {
  if(!ts) return '';
  return new Date(ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function daysAgo(ts) {
  if(!ts) return '';
  var d = Math.floor((Date.now() - new Date(ts).getTime())/(1000*60*60*24));
  if(d===0) return 'Today';
  if(d===1) return 'Yesterday';
  return d+'d ago';
}

function toggleSec(el) {
  el.classList.toggle('collapsed');
  var body = el.nextElementSibling;
  body.classList.toggle('collapsed');
}

function setFilter(type, el) {
  filterType = type;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  render();
}

function matchSearch(o) {
  if(!searchQ) return true;
  var q = searchQ.toLowerCase();
  return (o.company+o.contact+o.email+o.notes+o.location).toLowerCase().indexOf(q) >= 0;
}

function matchType(o) {
  if(filterType === 'all') return true;
  return o.type === filterType;
}

function renderCard(o, section) {
  var typeClass = o.type === 'investor' ? 'investor' : 'job';
  var typeBadge = o.type === 'investor' ? '<span class="badge badge-investor">Investor</span>' : '<span class="badge badge-job">Job</span>';
  var stageTS = '';
  if(section === 'sent') stageTS = o.sentAt ? 'Sent ' + formatTS(o.sentAt) : '';
  if(section === 'replied') stageTS = o.repliedAt ? 'Replied ' + formatTS(o.repliedAt) : '';
  if(section === 'call') stageTS = o.callAt ? 'Scheduled ' + formatTS(o.callAt) : '';
  if(section === 'closed') stageTS = o.closedAt ? 'Closed ' + formatTS(o.closedAt) : '';
  if(section === 'lost') stageTS = o.lostAt ? 'Lost ' + formatTS(o.lostAt) : '';
  if(section === 'bounced') stageTS = 'Bounced';

  var actions = '';
  if(section === 'sent') {
    actions = '<button class="btn-sm act-yes" onclick="move(\''+o.id+'\',\'replied\')" title="They replied">&#10003; Replied</button>' +
      '<button class="btn-sm act-no" onclick="move(\''+o.id+'\',\'lost\')" title="No response">&#10007; No Response</button>';
  } else if(section === 'replied') {
    actions = '<button class="btn-sm act-promote" onclick="move(\''+o.id+'\',\'call\')" title="Schedule a call">&#128197; Call Scheduled</button>' +
      '<button class="btn-sm act-no" onclick="move(\''+o.id+'\',\'lost\')" title="Not interested">&#10007; Lost</button>';
  } else if(section === 'call') {
    actions = '<button class="btn-sm act-yes" onclick="move(\''+o.id+'\',\'closed\')" title="Deal closed / hired">&#128176; Closed!</button>' +
      '<button class="btn-sm act-no" onclick="move(\''+o.id+'\',\'lost\')" title="Didn\'t work out">&#10007; Lost</button>';
  } else if(section === 'closed') {
    actions = '<span class="badge" style="background:rgba(0,200,83,.15);color:var(--green);font-size:12px;">&#10003; Done</span>';
  } else if(section === 'lost') {
    actions = '<button class="btn-sm act-retry" onclick="move(\''+o.id+'\',\'sent\')" title="Try again">&#128260; Retry</button>';
  } else if(section === 'bounced') {
    actions = '<button class="btn-sm act-retry" onclick="move(\''+o.id+'\',\'sent\')" title="Try different email">&#128260; Retry</button>' +
      '<button class="btn-sm act-del" onclick="del(\''+o.id+'\')">&#10005;</button>';
  }

  return '<div class="card '+typeClass+'">' +
    '<div class="card-info">' +
      '<div class="card-name">'+esc(o.company)+'<span class="timestamp">'+stageTS+'</span></div>' +
      '<div class="card-detail">' +
        (o.contact ? esc(o.contact) + ' &middot; ' : '') +
        '<a class="gold" href="mailto:'+esc(o.email)+'">'+esc(o.email)+'</a>' +
        (o.location ? ' &middot; '+esc(o.location) : '') +
      '</div>' +
      (o.notes ? '<div class="card-notes">'+esc(o.notes)+'</div>' : '') +
    '</div>' +
    '<div class="card-meta">' + typeBadge + '<span class="days-ago">'+daysAgo(o.sentAt)+'</span></div>' +
    '<div class="card-actions">' + actions +
      '<button class="btn-sm act-edit" onclick="openModal(\'edit\',\''+o.id+'\')">&#9998;</button>' +
    '</div>' +
  '</div>';
}

function render() {
  var f = items.filter(function(o){return matchSearch(o) && matchType(o);});
  var sent = f.filter(function(o){return o.stage==='sent';});
  var replied = f.filter(function(o){return o.stage==='replied';});
  var call = f.filter(function(o){return o.stage==='call';});
  var closed = f.filter(function(o){return o.stage==='closed';});
  var lost = f.filter(function(o){return o.stage==='lost';});
  var bounced = f.filter(function(o){return o.stage==='bounced';});

  var sortDate = function(a,b){return (b.sentAt||'').localeCompare(a.sentAt||'');};
  sent.sort(sortDate); replied.sort(sortDate); call.sort(sortDate); closed.sort(sortDate);

  document.getElementById('secSent').innerHTML = sent.length ? sent.map(function(o){return renderCard(o,'sent');}).join('') : '<div class="empty-msg">No pending emails.</div>';
  document.getElementById('secReplied').innerHTML = replied.length ? replied.map(function(o){return renderCard(o,'replied');}).join('') : '<div class="empty-msg">No replies yet.</div>';
  document.getElementById('secCall').innerHTML = call.length ? call.map(function(o){return renderCard(o,'call');}).join('') : '<div class="empty-msg">No calls scheduled.</div>';
  document.getElementById('secClosed').innerHTML = closed.length ? closed.map(function(o){return renderCard(o,'closed');}).join('') : '<div class="empty-msg">No deals closed yet. Keep going!</div>';
  document.getElementById('secLost').innerHTML = lost.length ? lost.map(function(o){return renderCard(o,'lost');}).join('') : '<div class="empty-msg">Nobody here yet.</div>';
  document.getElementById('secBounced').innerHTML = bounced.length ? bounced.map(function(o){return renderCard(o,'bounced');}).join('') : '<div class="empty-msg">No bounced emails.</div>';

  document.getElementById('countSent').textContent = sent.length;
  document.getElementById('countReplied').textContent = replied.length;
  document.getElementById('countCall').textContent = call.length;
  document.getElementById('countClosed').textContent = closed.length;
  document.getElementById('countLost').textContent = lost.length;
  document.getElementById('countBounced').textContent = bounced.length;

  var total = f.length;
  var repliedN = replied.length + call.length + closed.length;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="label">Total</div><div class="value">'+total+'</div></div>' +
    '<div class="stat"><div class="label">Sent</div><div class="value" style="color:var(--blue);">'+sent.length+'</div></div>' +
    '<div class="stat"><div class="label">Replied</div><div class="value" style="color:var(--orange);">'+replied.length+'</div></div>' +
    '<div class="stat"><div class="label">Calls</div><div class="value" style="color:var(--purple);">'+call.length+'</div></div>' +
    '<div class="stat"><div class="label">Closed</div><div class="value" style="color:var(--green);">'+closed.length+'</div></div>' +
    (total > 0 ? '<div class="stat"><div class="label">Reply Rate</div><div class="value" style="color:var(--gold);">'+Math.round(repliedN/total*100)+'%</div></div>' : '');
}

function move(id, stage) {
  var o = items.find(function(x){return x.id===id;});
  if(!o) return;
  var ts = new Date().toISOString();
  o.stage = stage;
  if(stage==='replied') o.repliedAt = o.repliedAt || ts;
  if(stage==='call') o.callAt = ts;
  if(stage==='closed') o.closedAt = ts;
  if(stage==='lost') o.lostAt = ts;
  var labels = {replied:'Marked as Replied',call:'Call Scheduled',closed:'CLOSED!',lost:'Marked as Lost',sent:'Moved back to Sent'};
  toast(labels[stage] || 'Updated');
  save(); render();
}

function del(id) {
  if(!confirm('Delete this contact?')) return;
  items = items.filter(function(o){return o.id!==id;});
  save(); render(); toast('Deleted');
}

function openModal(mode, id) {
  var isEdit = mode === 'edit';
  document.getElementById('editId').value = isEdit ? id : '';
  document.getElementById('modalTitle').innerHTML = isEdit ? 'Edit <span>Contact</span>' : 'Add <span>Contact</span>';
  if(isEdit) {
    var o = items.find(function(x){return x.id===id;});
    if(!o) return;
    document.getElementById('fCompany').value = o.company;
    document.getElementById('fContact').value = o.contact||'';
    document.getElementById('fEmail').value = o.email||'';
    document.getElementById('fType').value = o.type||'investor';
    document.getElementById('fStage').value = o.stage||'sent';
    document.getElementById('fLocation').value = o.location||'';
    document.getElementById('fNotes').value = o.notes||'';
  } else {
    ['fCompany','fContact','fEmail','fLocation','fNotes'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('fType').value='investor';
    document.getElementById('fStage').value='sent';
  }
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(function(){document.getElementById('fCompany').focus();},100);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

function saveContact() {
  var company = document.getElementById('fCompany').value.trim();
  if(!company){document.getElementById('fCompany').style.borderColor='var(--red)';return;}
  var editId = document.getElementById('editId').value;
  var data = {
    id: editId || genId(),
    company: company,
    contact: document.getElementById('fContact').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    type: document.getElementById('fType').value,
    stage: document.getElementById('fStage').value,
    location: document.getElementById('fLocation').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
    sentAt: new Date().toISOString()
  };
  if(editId) {
    var idx = items.findIndex(function(x){return x.id===editId;});
    if(idx>=0){var old=items[idx]; data.sentAt=old.sentAt; data.repliedAt=old.repliedAt; data.callAt=old.callAt; data.closedAt=old.closedAt; items[idx]=data;}
  } else { items.push(data); }
  save(); render(); closeModal(); toast(editId ? 'Updated' : 'Contact Added');
}

function exportCSV() {
  var rows = [['Company','Contact','Email','Type','Stage','Location','Sent','Notes']];
  items.forEach(function(o){rows.push([o.company,o.contact,o.email,o.type,o.stage,o.location,o.sentAt,o.notes]);});
  var csv = rows.map(function(r){return r.map(function(c){return '"'+(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob = new Blob([csv],{type:'text/csv'});
  var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='janovum_outreach.csv'; a.click();
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

load();
render();
</script>
</body>
</html>
