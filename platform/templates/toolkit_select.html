<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janovum Toolkit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    max-width: 500px;
    padding: 20px;
  }
  .logo h1 {
    font-size: 32px;
    font-weight: 700;
    color: #ff6b35;
    letter-spacing: 2px;
  }
  .logo p {
    color: #888;
    font-size: 15px;
    margin-top: 8px;
    margin-bottom: 40px;
  }
  .cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 14px;
    padding: 36px 32px;
    width: 210px;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    border-color: #ff6b35;
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(255,107,53,0.15);
  }
  .card .icon {
    font-size: 40px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #fff;
  }
  .card p {
    font-size: 13px;
    color: #888;
    line-height: 1.5;
  }
  .card.admin { border-top: 3px solid #ff6b35; }
  .card.user { border-top: 3px solid #4ecdc4; }
  .card.guest { border-top: 3px solid #a78bfa; }
  .card.admin:hover { border-color: #ff6b35; }
  .card.user:hover { border-color: #4ecdc4; }
  .card.guest:hover { border-color: #a78bfa; box-shadow: 0 8px 30px rgba(167,139,250,0.15); }
  .card.user h2 { color: #4ecdc4; }
  .card.admin h2 { color: #ff6b35; }
  .card.guest h2 { color: #a78bfa; }
  .footer {
    margin-top: 48px;
    font-size: 12px;
    color: #444;
  }
  .footer a { color: #ff6b35; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>JANOVUM</h1>
    <p>AI Agent Toolkit</p>
  </div>

  <div class="cards">
    <a href="/toolkit/admin" class="card admin">
      <div class="icon">&#128272;</div>
      <h2>Admin</h2>
      <p>Janovum team access. Manage all clients and systems.</p>
    </a>

    <a href="/toolkit/use/login" class="card user">
      <div class="icon">&#128640;</div>
      <h2>Get Started</h2>
      <p>Sign up or log in to build your own AI receptionist.</p>
    </a>

    <a href="/toolkit/guest" class="card guest">
      <div class="icon">&#128065;</div>
      <h2>Guest</h2>
      <p>Preview the toolkit. Explore freely — nothing saves.</p>
    </a>
  </div>

  <div class="footer">Powered by <a href="/">Janovum AI</a></div>
</div>
</body>
</html>
